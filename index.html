<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>賣貨系統</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: system-ui, 'Segoe UI', Roboto, Arial, sans-serif;
        }
        body {
            background: #f1f5f9;
            padding: 20px;
        }
        .page {
            display: none;
            max-width: 900px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 28px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            min-height: 85vh;
            position: relative;
        }
        .page.active { display: block; }
        h1, h2 { text-align: center; margin-bottom: 24px; color: #1e293b; }
        .btn {
            width: 100%;
            padding: 14px;
            font-size: 18px;
            border: none;
            border-radius: 60px;
            cursor: pointer;
            background: #3b82f6;
            color: white;
            margin-top: 16px;
            font-weight: 600;
            transition: 0.2s;
        }
        .btn:hover { background: #2563eb; transform: translateY(-1px);}
        .back-btn { background: #64748b; }
        .back-btn:hover { background: #475569; }
        .form-group { margin-bottom: 24px; }
        label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 0.9rem;
            color: #334155;
        }
        input, select {
            width: 100%;
            padding: 12px;
            font-size: 16px;
            border: 1px solid #cbd5e1;
            border-radius: 40px;
            background: white;
        }
        .select-list {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 5px;
        }
        .select-item {
            padding: 8px 18px;
            border: 1px solid #cbd5e1;
            border-radius: 60px;
            cursor: pointer;
            background: white;
            transition: 0.1s;
        }
        .select-item.active {
            background: #3b82f6;
            color: white;
            border-color: #3b82f6;
        }
        .product-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            border: 1px solid #e2e8f0;
            border-radius: 24px;
            margin-bottom: 10px;
            background: #f8fafc;
        }
        .count-controls {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .count-btn {
            width: 36px;
            height: 36px;
            border: none;
            border-radius: 50%;
            font-size: 20px;
            cursor: pointer;
            background: #e2e8f0;
            font-weight: bold;
        }
        .count-btn.minus { background: #fee2e2; color: #b91c1c; }
        .count-btn.plus { background: #dcfce7; color: #15803d; }
        .price-display {
            text-align: center;
            font-size: 2.2rem;
            font-weight: 800;
            color: #3b82f6;
            padding: 16px;
            background: #f1f5f9;
            border-radius: 48px;
            margin: 12px 0;
        }
        .num-keyboard {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            max-width: 280px;
            margin: 0 auto;
        }
        .num-btn {
            padding: 16px;
            font-size: 1.3rem;
            border: 1px solid #cbd5e1;
            border-radius: 60px;
            cursor: pointer;
            background: white;
            transition: 0.05s linear;
        }
        .num-btn:active { background: #e2e8f0; transform: scale(0.96);}
        .settings-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            padding: 6px 14px;
            background: #e2e8f0;
            border: none;
            border-radius: 60px;
            cursor: pointer;
            font-size: 1.2rem;
        }
        .records-list {
            margin-top: 20px;
            max-height: 400px;
            overflow-y: auto;
            border: 1px solid #e2e8f0;
            border-radius: 20px;
        }
        .record-item {
            padding: 14px;
            border-bottom: 1px solid #e2e8f0;
        }
        .record-header {
            font-weight: bold;
            color: #2563eb;
            margin-bottom: 6px;
        }
        .record-details {
            font-size: 0.85rem;
            color: #475569;
        }
        .sync-status {
            font-size: 0.7rem;
            margin-top: 5px;
            color: #10b981;
        }
        .sync-error { color: #ef4444; }
        .staff-id-display {
            background: #f1f5f9;
            padding: 10px;
            border-radius: 40px;
            margin-top: 8px;
            font-size: 0.8rem;
        }
        .list-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            border-bottom: 1px solid #e2e8f0;
        }
        .delete-btn {
            background: #ef4444;
            color: white;
            border: none;
            padding: 4px 12px;
            border-radius: 40px;
            cursor: pointer;
        }
        .add-btn {
            background: #10b981;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 40px;
            cursor: pointer;
            margin-top: 10px;
        }
        .btn-small { width: auto; padding: 8px 16px; margin-top: 8px; }
        footer { text-align: center; margin-top: 20px; font-size: 0.7rem; color: #94a3b8; }
    </style>
</head>
<body>
    <!-- 首頁 -->
    <div id="homePage" class="page active">
        <h1>📦 賣貨管理系統</h1>
        <button class="btn" onclick="goToPage('productPage')">📝 產品銷售記錄</button>
        <button class="btn" onclick="goToPage('customerPage')">👤 客人消費記錄</button>
        <button class="btn" onclick="goToPage('recordsPage')">📋 查看所有記錄</button>
        <button class="btn" onclick="goToPage('settingsPage')">⚙️ 系統設定</button>
    </div>

    <!-- 產品頁面 -->
    <div id="productPage" class="page">
        <button class="settings-btn" onclick="goToPage('settingsPage')">⚙️</button>
        <h2>產品銷售</h2>
        <div class="form-group"><label>📅 日期</label><input type="date" id="productDate"></div>
        <div class="form-group"><label>👩‍💼 銷售員工</label><div id="productStaffList" class="select-list"></div><div class="staff-id-display">工號：<span id="productStaffIdDisplay">-</span></div></div>
        <div class="form-group"><label>🛒 產品</label><div id="productItemsList"></div></div>
        <div class="form-group"><label>💰 金額</label><div class="price-display" id="productPrice">0</div><div class="num-keyboard" id="productKeyboard"></div></div>
        <div class="form-group"><label>💳 支付方式</label><div id="productPaymentList" class="select-list"></div></div>
        <button class="btn" onclick="submitProduct()">✔ 確定提交</button>
        <button class="btn back-btn" onclick="goToPage('homePage')">← 返回首頁</button>
    </div>

    <!-- 客人頁面 -->
    <div id="customerPage" class="page">
        <button class="settings-btn" onclick="goToPage('settingsPage')">⚙️</button>
        <h2>客人消費</h2>
        <div class="form-group"><label>📅 日期</label><input type="date" id="customerDate"></div>
        <div class="form-group"><label>👩‍💼 服務員工</label><div id="customerStaffList" class="select-list"></div><div class="staff-id-display">工號：<span id="customerStaffIdDisplay">-</span></div></div>
        <div class="form-group"><label>💰 消費金額</label><div class="price-display" id="customerPrice">0</div><div class="num-keyboard" id="customerKeyboard"></div></div>
        <div class="form-group"><label>💳 支付方式</label><div id="customerPaymentList" class="select-list"></div></div>
        <button class="btn" onclick="submitCustomer()">✔ 確定提交</button>
        <button class="btn back-btn" onclick="goToPage('homePage')">← 返回首頁</button>
    </div>

    <!-- 記錄查詢頁 -->
    <div id="recordsPage" class="page">
        <h2>📜 所有記錄</h2>
        <button class="btn btn-small" onclick="syncAll()">🔄 同步未成功記錄</button>
        <div id="allRecordsList" class="records-list"></div>
        <button class="btn back-btn" onclick="goToPage('homePage')">← 返回</button>
    </div>

    <!-- 設定頁 -->
    <div id="settingsPage" class="page">
        <h2>⚙️ 系統設定</h2>
        <div class="form-group"><label>👥 員工管理</label><div id="settingsStaffList"></div><button class="add-btn" onclick="addStaff()">＋ 新增員工</button></div>
        <div class="form-group"><label>📦 產品管理</label><div id="settingsProductList"></div><button class="add-btn" onclick="addProduct()">＋ 新增產品</button></div>
        <button class="btn" onclick="clearLocalRecords()">🗑️ 清空本地記錄</button>
        <button class="btn back-btn" onclick="goToPage('homePage')">← 返回</button>
    </div>
    <footer>數據自動同步至 Google Sheets</footer>

    <script>
        // ==================== 前端邏輯 ====================
        // API 地址即為當前網頁的基址 + 後端處理
        const API_URL = window.location.origin + window.location.pathname;

        // 本地儲存 KEY
        const STAFF_KEY = "staffList";
        const PRODUCT_KEY = "productList";
        const RECORDS_KEY = "salesRecords";

        // 系統預設
        let staffList = JSON.parse(localStorage.getItem(STAFF_KEY)) || [
            { name: "陳大文", id: "A001" },
            { name: "李小美", id: "B002" },
            { name: "張志強", id: "C003" }
        ];
        let productList = JSON.parse(localStorage.getItem(PRODUCT_KEY)) || [
            { name: "紅罐", price: 178 },
            { name: "猩猩粉", price: 100 },
            { name: "打底水", price: 148 }
        ];
        let records = JSON.parse(localStorage.getItem(RECORDS_KEY)) || [];
        const payments = ["現金", "轉數快", "支付寶", "PayMe", "微信支付"];

        let productManualPrice = false;
        let productSelectedCounts = [];

        // 輔助函數
        function saveStaff() { localStorage.setItem(STAFF_KEY, JSON.stringify(staffList)); }
        function saveProducts() { localStorage.setItem(PRODUCT_KEY, JSON.stringify(productList)); }
        function saveRecords() { localStorage.setItem(RECORDS_KEY, JSON.stringify(records)); }

        // 頁面切換
        function goToPage(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if (id === 'productPage') initProductPage();
            if (id === 'customerPage') initCustomerPage();
            if (id === 'recordsPage') renderRecords();
            if (id === 'settingsPage') renderSettings();
        }

        // 初始化產品頁
        function initProductPage() {
            document.getElementById('productDate').valueAsDate = new Date();
            renderStaffSelect('productStaffList', 'productStaffIdDisplay');
            renderProducts();
            renderPayments('productPaymentList');
            productManualPrice = false;
            updateProductTotal();
            buildNumpad('product');
        }

        function renderProducts() {
            const container = document.getElementById('productItemsList');
            container.innerHTML = '';
            productSelectedCounts = new Array(productList.length).fill(0);
            productList.forEach((p, i) => {
                const div = document.createElement('div');
                div.className = 'product-item';
                div.innerHTML = `
                    <div><strong>${p.name}</strong><br><span style="font-size:0.8rem;">$${p.price}</span></div>
                    <div class="count-controls">
                        <button class="count-btn minus" data-index="${i}" data-delta="-1">-</button>
                        <span id="cnt${i}">0</span>
                        <button class="count-btn plus" data-index="${i}" data-delta="1">+</button>
                    </div>
                `;
                container.appendChild(div);
            });
            document.querySelectorAll('.count-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const idx = parseInt(btn.dataset.index);
                    const delta = parseInt(btn.dataset.delta);
                    let val = productSelectedCounts[idx] + delta;
                    if (val < 0) val = 0;
                    productSelectedCounts[idx] = val;
                    document.getElementById(`cnt${idx}`).innerText = val;
                    if (!productManualPrice) updateProductTotal();
                });
            });
        }

        function updateProductTotal() {
            let total = 0;
            productList.forEach((p, i) => total += p.price * productSelectedCounts[i]);
            document.getElementById('productPrice').innerText = total;
        }

        function renderStaffSelect(containerId, displayId) {
            const container = document.getElementById(containerId);
            container.innerHTML = '';
            staffList.forEach(s => {
                const btn = document.createElement('div');
                btn.className = 'select-item';
                btn.innerText = s.name;
                btn.onclick = () => {
                    container.querySelectorAll('.select-item').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    document.getElementById(displayId).innerText = s.id;
                };
                container.appendChild(btn);
            });
        }

        function renderPayments(containerId) {
            const container = document.getElementById(containerId);
            container.innerHTML = '';
            payments.forEach(p => {
                const btn = document.createElement('div');
                btn.className = 'select-item';
                btn.innerText = p;
                btn.onclick = () => {
                    container.querySelectorAll('.select-item').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                };
                container.appendChild(btn);
            });
        }

        function buildNumpad(type) {
            const container = document.getElementById(`${type}Keyboard`);
            if (!container) return;
            const keys = ['7','8','9','4','5','6','1','2','3','0','C','⌫'];
            container.innerHTML = '';
            keys.forEach(k => {
                const btn = document.createElement('button');
                btn.className = 'num-btn';
                btn.innerText = k;
                btn.onclick = () => {
                    const priceEl = document.getElementById(`${type}Price`);
                    let val = priceEl.innerText;
                    if (k === 'C') { val = '0'; if (type === 'product') productManualPrice = false; }
                    else if (k === '⌫') { val = val.length > 1 ? val.slice(0,-1) : '0'; }
                    else {
                        if (type === 'product') productManualPrice = true;
                        val = val === '0' ? k : val + k;
                    }
                    priceEl.innerText = parseInt(val) || 0;
                    if (type === 'product' && productManualPrice) updateProductTotal();
                };
                container.appendChild(btn);
            });
        }

        function initCustomerPage() {
            document.getElementById('customerDate').valueAsDate = new Date();
            renderStaffSelect('customerStaffList', 'customerStaffIdDisplay');
            renderPayments('customerPaymentList');
            document.getElementById('customerPrice').innerText = '0';
            buildNumpad('customer');
        }

        function getSelectedStaffId(containerId) {
            const active = document.querySelector(`#${containerId} .select-item.active`);
            if (!active) return '';
            const staff = staffList.find(s => s.name === active.innerText);
            return staff ? staff.id : '';
        }

        function getSelectedPayment(containerId) {
            const active = document.querySelector(`#${containerId} .select-item.active`);
            return active ? active.innerText : '';
        }

        async function submitProduct() {
            const date = document.getElementById('productDate').value;
            const staffName = document.querySelector('#productStaffList .select-item.active')?.innerText;
            const staffId = getSelectedStaffId('productStaffList');
            const price = document.getElementById('productPrice').innerText;
            const payment = getSelectedPayment('productPaymentList');
            if (!date || !staffName || !staffId || price === '0' || !payment) {
                alert('請完整填寫所有欄位');
                return;
            }
            const items = productList.map((p,i) => productSelectedCounts[i] > 0 ? `${p.name} x${productSelectedCounts[i]}` : '').filter(v=>v).join('，');
            const record = {
                type: 'product',
                date, staff: staffName, staffId, products: items, price, payment,
                createTime: new Date().toLocaleString(), syncStatus: 'pending'
            };
            records.unshift(record);
            saveRecords();
            await syncToGoogle(record);
            alert('已提交，將同步至雲端');
            initProductPage();
        }

        async function submitCustomer() {
            const date = document.getElementById('customerDate').value;
            const staffName = document.querySelector('#customerStaffList .select-item.active')?.innerText;
            const staffId = getSelectedStaffId('customerStaffList');
            const price = document.getElementById('customerPrice').innerText;
            const payment = getSelectedPayment('customerPaymentList');
            if (!date || !staffName || !staffId || price === '0' || !payment) {
                alert('請完整填寫所有欄位');
                return;
            }
            const record = {
                type: 'customer',
                date, staff: staffName, staffId, products: '', price, payment,
                createTime: new Date().toLocaleString(), syncStatus: 'pending'
            };
            records.unshift(record);
            saveRecords();
            await syncToGoogle(record);
            alert('已提交，將同步至雲端');
            initCustomerPage();
        }

        async function syncToGoogle(record) {
            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: 'data=' + encodeURIComponent(JSON.stringify({
                        sheetType: record.type,
                        record: {
                            date: record.date,
                            staff: record.staff,
                            staffId: record.staffId,
                            items: record.products,
                            price: record.price,
                            payment: record.payment
                        }
                    }))
                });
                const result = await response.json();
                const idx = records.findIndex(r => r.createTime === record.createTime && r.price === record.price);
                if (idx !== -1) {
                    records[idx].syncStatus = result.success ? 'success' : 'error';
                    records[idx].syncMsg = result.msg;
                    saveRecords();
                }
            } catch(e) {
                console.error(e);
                const idx = records.findIndex(r => r.createTime === record.createTime && r.price === record.price);
                if (idx !== -1) { records[idx].syncStatus = 'error'; records[idx].syncMsg = e.message; saveRecords(); }
            }
        }

        async function syncAll() {
            const pending = records.filter(r => r.syncStatus !== 'success');
            if (pending.length === 0) { alert('所有記錄已同步'); return; }
            for (let r of pending) await syncToGoogle(r);
            renderRecords();
            alert('同步完成');
        }

        function renderRecords() {
            const container = document.getElementById('allRecordsList');
            if (!records.length) { container.innerHTML = '<div style="padding:20px;text-align:center;">暫無記錄</div>'; return; }
            container.innerHTML = records.map(r => `
                <div class="record-item">
                    <div class="record-header">${r.type === 'product' ? '📦 產品銷售' : '👤 客人消費'} | ${r.date} | ${r.createTime}</div>
                    <div class="record-details">
                        員工：${r.staff} (${r.staffId})<br>
                        項目：${r.products || '無'}<br>
                        金額：$${r.price} | 支付：${r.payment}
                    </div>
                    <div class="sync-status ${r.syncStatus === 'error' ? 'sync-error' : ''}">
                        ${r.syncStatus === 'success' ? '✅ 已同步' : r.syncStatus === 'error' ? `❌ 同步失敗：${r.syncMsg || ''}` : '⏳ 等待同步'}
                    </div>
                </div>
            `).join('');
        }

        function renderSettings() {
            const staffContainer = document.getElementById('settingsStaffList');
            staffContainer.innerHTML = staffList.map((s,i) => `
                <div class="list-item"><span>${s.name} (${s.id})</span><button class="delete-btn" onclick="deleteStaff(${i})">刪除</button></div>
            `).join('');
            const productContainer = document.getElementById('settingsProductList');
            productContainer.innerHTML = productList.map((p,i) => `
                <div class="list-item"><span>${p.name} - $${p.price}</span><button class="delete-btn" onclick="deleteProduct(${i})">刪除</button></div>
            `).join('');
        }

        function addStaff() {
            const name = prompt('員工姓名');
            if (!name) return;
            const id = prompt('員工工號');
            if (!id) return;
            staffList.push({ name, id });
            saveStaff();
            renderSettings();
        }
        function deleteStaff(idx) { if(confirm('刪除員工？')) { staffList.splice(idx,1); saveStaff(); renderSettings(); } }
        function addProduct() {
            const name = prompt('產品名稱');
            if (!name) return;
            const price = parseInt(prompt('產品價格'));
            if (isNaN(price)) return;
            productList.push({ name, price });
            saveProducts();
            renderSettings();
        }
        function deleteProduct(idx) { if(confirm('刪除產品？')) { productList.splice(idx,1); saveProducts(); renderSettings(); } }
        function clearLocalRecords() { if(confirm('清空所有本地記錄？不可復原')) { records = []; saveRecords(); renderRecords(); alert('已清空'); } }

        window.onload = () => goToPage('homePage');
    </script>
</body>
</html>
