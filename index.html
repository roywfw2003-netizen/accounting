<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>賣貨系統</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
        }
        body {
            background: #f5f5f5;
            padding: 20px;
        }
        .page {
            display: none;
            max-width: 800px;
            margin: 0 auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            position: relative;
            min-height: 90vh;
        }
        .page.active {
            display: block;
        }
        h1, h2 {
            text-align: center;
            margin-bottom: 20px;
            color: #333;
        }
        .btn-group {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin-top: 30px;
        }
        .btn {
            padding: 15px 30px;
            font-size: 18px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            background: #007bff;
            color: white;
        }
        .btn:hover {
            background: #0056b3;
        }
        .back-btn {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            padding: 10px 20px;
            background: #6c757d;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
        }
        input[type="date"] {
            width: 100%;
            padding: 10px;
            font-size: 16px;
            border: 1px solid #ddd;
            border-radius: 5px;
        }
        .select-list {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }
        .select-item {
            padding: 8px 15px;
            border: 1px solid #ddd;
            border-radius: 5px;
            cursor: pointer;
        }
        .select-item.active {
            background: #007bff;
            color: white;
            border-color: #007bff;
        }
        .product-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 15px;
            border: 1px solid #ddd;
            border-radius: 5px;
        }
        .count-btn {
            width: 30px;
            height: 30px;
            border: none;
            border-radius: 50%;
            background: #28a745;
            color: white;
            cursor: pointer;
        }
        .count-btn.minus {
            background: #dc3545;
        }
        .payment-methods {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
        }
        .payment-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 8px;
            cursor: pointer;
            width: 100px;
        }
        .payment-item.active {
            border-color: #007bff;
            background: #e7f3ff;
        }
        .payment-item i {
            font-size: 24px;
        }
        .num-keyboard {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            max-width: 300px;
            margin: 0 auto;
        }
        .num-btn {
            padding: 20px;
            font-size: 20px;
            border: 1px solid #ddd;
            border-radius: 8px;
            cursor: pointer;
            background: white;
        }
        .num-btn:hover {
            background: #f0f0f0;
        }
        .price-display {
            text-align: center;
            font-size: 24px;
            margin-bottom: 20px;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
        }
        .settings-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            background: #6c757d;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
        }
        .modal-content {
            background: white;
            padding: 20px;
            border-radius: 10px;
            width: 90%;
            max-width: 400px;
        }
        .modal input {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            border: 1px solid #ddd;
            border-radius: 5px;
        }
        .modal-btns {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }
        .settings-section {
            margin-bottom: 30px;
        }
        .settings-section h3 {
            margin-bottom: 10px;
            color: #007bff;
        }
        .list-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px;
            border-bottom: 1px solid #eee;
        }
        .delete-btn {
            background: #dc3545;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 5px;
            cursor: pointer;
        }
        .add-btn {
            background: #28a745;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 10px;
        }
        .record-section {
            margin-top: 30px;
            display: flex;
            gap: 20px;
            justify-content: center;
        }
        .record-box {
            width: 45%;
            background: white;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 0 5px rgba(0,0,0,0.1);
        }
        .record-box h3 {
            text-align: center;
            margin-bottom: 10px;
            color: #007bff;
        }
        .record-item {
            padding: 8px;
            border-bottom: 1px solid #eee;
            font-size: 14px;
        }
        .record-item:last-child {
            border-bottom: none;
        }
        .record-toggle {
            text-align: center;
            margin-top: 10px;
        }
        .record-toggle button {
            padding: 8px 15px;
            background: #28a745;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <!-- 主頁 -->
    <div id="homePage" class="page active">
        <h1>賣貨系統</h1>
        <div class="btn-group">
            <button class="btn" onclick="goToPage('productPage')">產品頁面</button>
            <button class="btn" onclick="goToPage('customerPage')">客人頁面</button>
        </div>
        <div class="record-section">
            <div class="record-box">
                <h3>產品紀錄</h3>
                <div id="productRecordList"></div>
                <div class="record-toggle">
                    <button onclick="toggleRecord('product')">查看紀錄</button>
                </div>
            </div>
            <div class="record-box">
                <h3>客人紀錄</h3>
                <div id="customerRecordList"></div>
                <div class="record-toggle">
                    <button onclick="toggleRecord('customer')">查看紀錄</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 產品頁面 -->
    <div id="productPage" class="page">
        <button class="settings-btn" onclick="openSettings('product')">設定</button>
        <h2>產品頁面</h2>
        <div class="form-group">
            <label>日期</label>
            <input type="date" id="productDate">
        </div>
        <div class="form-group">
            <label>員工</label>
            <div class="select-list" id="productStaffList"></div>
        </div>
        <div class="form-group">
            <label>貨品</label>
            <div class="select-list" id="productItemList"></div>
        </div>
        <div class="form-group">
            <label>價錢</label>
            <div class="price-display" id="productPrice">0</div>
            <div class="num-keyboard">
                <button class="num-btn" onclick="inputNum('product', 7)">7</button>
                <button class="num-btn" onclick="inputNum('product', 8)">8</button>
                <button class="num-btn" onclick="inputNum('product', 9)">9</button>
                <button class="num-btn" onclick="inputNum('product', 4)">4</button>
                <button class="num-btn" onclick="inputNum('product', 5)">5</button>
                <button class="num-btn" onclick="inputNum('product', 6)">6</button>
                <button class="num-btn" onclick="inputNum('product', 1)">1</button>
                <button class="num-btn" onclick="inputNum('product', 2)">2</button>
                <button class="num-btn" onclick="inputNum('product', 3)">3</button>
                <button class="num-btn" onclick="inputNum('product', 0)">0</button>
                <button class="num-btn" onclick="clearPrice('product')">清除</button>
                <button class="num-btn" onclick="backspacePrice('product')">刪除</button>
            </div>
        </div>
        <div class="form-group">
            <label>支付方式</label>
            <div class="payment-methods" id="productPaymentList"></div>
        </div>
        <button class="btn" style="width:100%" onclick="submitProduct()">確定遞交</button>
        <button class="back-btn" onclick="goToPage('homePage')">返回</button>
    </div>

    <!-- 客人頁面 -->
    <div id="customerPage" class="page">
        <button class="settings-btn" onclick="openSettings('customer')">設定</button>
        <h2>客人頁面</h2>
        <div class="form-group">
            <label>日期</label>
            <input type="date" id="customerDate">
        </div>
        <div class="form-group">
            <label>員工</label>
            <div class="select-list" id="customerStaffList"></div>
        </div>
        <div class="form-group">
            <label>價錢</label>
            <div class="price-display" id="customerPrice">0</div>
            <div class="num-keyboard">
                <button class="num-btn" onclick="inputNum('customer', 7)">7</button>
                <button class="num-btn" onclick="inputNum('customer', 8)">8</button>
                <button class="num-btn" onclick="inputNum('customer', 9)">9</button>
                <button class="num-btn" onclick="inputNum('customer', 4)">4</button>
                <button class="num-btn" onclick="inputNum('customer', 5)">5</button>
                <button class="num-btn" onclick="inputNum('customer', 6)">6</button>
                <button class="num-btn" onclick="inputNum('customer', 1)">1</button>
                <button class="num-btn" onclick="inputNum('customer', 2)">2</button>
                <button class="num-btn" onclick="inputNum('customer', 3)">3</button>
                <button class="num-btn" onclick="inputNum('customer', 0)">0</button>
                <button class="num-btn" onclick="clearPrice('customer')">清除</button>
                <button class="num-btn" onclick="backspacePrice('customer')">刪除</button>
            </div>
        </div>
        <div class="form-group">
            <label>支付方式</label>
            <div class="payment-methods" id="customerPaymentList"></div>
        </div>
        <button class="btn" style="width:100%" onclick="submitCustomer()">確定遞交</button>
        <button class="back-btn" onclick="goToPage('homePage')">返回</button>
    </div>

    <!-- 設定頁面 -->
    <div id="settingsPage" class="page">
        <h2>系統設定</h2>
        <div class="settings-section">
            <h3>密碼設定</h3>
            <input type="password" id="newPassword" placeholder="輸入新密碼">
            <button class="add-btn" onclick="changePassword()">修改密碼</button>
        </div>
        <div class="settings-section">
            <h3>員工管理</h3>
            <div id="settingsStaffList"></div>
            <button class="add-btn" onclick="addStaff()">新增員工</button>
        </div>
        <div class="settings-section" id="productSettingsSection">
            <h3>貨品管理</h3>
            <div id="settingsItemList"></div>
            <button class="add-btn" onclick="addItem()">新增貨品</button>
        </div>
        <button class="back-btn" onclick="goToPage('homePage')">返回</button>
    </div>

    <!-- 密碼驗證彈窗 -->
    <div id="passwordModal" class="modal">
        <div class="modal-content">
            <h3>請輸入密碼</h3>
            <input type="password" id="passwordInput" placeholder="密碼">
            <div class="modal-btns">
                <button class="btn" style="background:#6c757d" onclick="closeModal()">取消</button>
                <button class="btn" onclick="verifyPassword()">確定</button>
            </div>
        </div>
    </div>

    <script>
        // 初始化數據
        let data = {
            password: '123456',
            staff: ['員工A', '員工B', '員工C'],
            items: ['洗剪', '燙髮', '染髮', '護理'],
            payments: [
                {name: '現金', icon: 'fa-money-bill-wave'},
                {name: '轉數快', icon: 'fa-mobile-alt'},
                {name: '支付寶', icon: 'fa-alipay'},
                {name: 'PayMe', icon: 'fa-credit-card'},
                {name: '微信支付', icon: 'fa-weixin'}
            ],
            productRecords: [],
            customerRecords: []
        };

        // 頁面切換
        function goToPage(pageId) {
            document.querySelectorAll('.page').forEach(page => page.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            
            if (pageId === 'productPage') initProductPage();
            if (pageId === 'customerPage') initCustomerPage();
            if (pageId === 'settingsPage') initSettingsPage();
            if (pageId === 'homePage') renderRecords();
        }

        // 初始化產品頁
        function initProductPage() {
            document.getElementById('productDate').valueAsDate = new Date();
            renderSelectList('productStaffList', data.staff, 'staff');
            renderProductItems();
            renderPaymentList('productPaymentList');
            document.getElementById('productPrice').textContent = '0';
        }

        // 初始化客人頁
        function initCustomerPage() {
            document.getElementById('customerDate').valueAsDate = new Date();
            renderSelectList('customerStaffList', data.staff, 'staff');
            renderPaymentList('customerPaymentList');
            document.getElementById('customerPrice').textContent = '0';
        }

        // 渲染選擇列表
        function renderSelectList(containerId, list, type) {
            const container = document.getElementById(containerId);
            container.innerHTML = '';
            list.forEach(item => {
                const div = document.createElement('div');
                div.className = 'select-item';
                div.textContent = item;
                div.onclick = () => toggleSelect(div, type);
                container.appendChild(div);
            });
        }

        // 渲染貨品（可計數）
        function renderProductItems() {
            const container = document.getElementById('productItemList');
            container.innerHTML = '';
            data.items.forEach(item => {
                const div = document.createElement('div');
                div.className = 'product-item';
                div.innerHTML = `
                    <span>${item}</span>
                    <button class="count-btn minus" onclick="changeCount(this, -1)">-</button>
                    <span class="count">0</span>
                    <button class="count-btn" onclick="changeCount(this, 1)">+</button>
                `;
                container.appendChild(div);
            });
        }

        // 渲染支付方式
        function renderPaymentList(containerId) {
            const container = document.getElementById(containerId);
            container.innerHTML = '';
            data.payments.forEach(payment => {
                const div = document.createElement('div');
                div.className = 'payment-item';
                div.innerHTML = `<i class="fas ${payment.icon}"></i><span>${payment.name}</span>`;
                div.onclick = () => toggleSelect(div, 'payment');
                container.appendChild(div);
            });
        }

        // 切換選擇狀態
        function toggleSelect(el, type) {
            const container = el.parentElement;
            if (type === 'staff' || type === 'payment') {
                container.querySelectorAll('.select-item, .payment-item').forEach(item => item.classList.remove('active'));
            }
            el.classList.add('active');
        }

        // 改變貨品數量
        function changeCount(btn, delta) {
            const countSpan = btn.parentElement.querySelector('.count');
            let count = parseInt(countSpan.textContent) + delta;
            if (count < 0) count = 0;
            countSpan.textContent = count;
        }

        // 數字鍵盤輸入
        function inputNum(type, num) {
            const priceEl = document.getElementById(type + 'Price');
            let price = priceEl.textContent;
            if (price === '0') price = '';
            priceEl.textContent = price + num;
        }

        // 清除價錢
        function clearPrice(type) {
            document.getElementById(type + 'Price').textContent = '0';
        }

        // 刪除最後一位
        function backspacePrice(type) {
            const priceEl = document.getElementById(type + 'Price');
            let price = priceEl.textContent;
            if (price.length > 1) {
                priceEl.textContent = price.slice(0, -1);
            } else {
                priceEl.textContent = '0';
            }
        }

        // 提交產品頁
        function submitProduct() {
            const date = document.getElementById('productDate').value;
            const staff = getSelectedText('productStaffList');
            const items = getSelectedProducts();
            const price = document.getElementById('productPrice').textContent;
            const payment = getSelectedText('productPaymentList');

            if (!date || !staff || items.length === 0 || price === '0' || !payment) {
                alert('請填寫完整資訊！');
                return;
            }

            const record = {date, staff, items: items.join(', '), price, payment};
            data.productRecords.unshift(record);
            alert('產品頁提交成功！');
            goToPage('homePage');
        }

        // 提交客人頁
        function submitCustomer() {
            const date = document.getElementById('customerDate').value;
            const staff = getSelectedText('customerStaffList');
            const price = document.getElementById('customerPrice').textContent;
            const payment = getSelectedText('customerPaymentList');

            if (!date || !staff || price === '0' || !payment) {
                alert('請填寫完整資訊！');
                return;
            }

            const record = {date, staff, price, payment};
            data.customerRecords.unshift(record);
            alert('客人頁提交成功！');
            goToPage('homePage');
        }

        // 獲取選中文字
        function getSelectedText(containerId) {
            const active = document.querySelector(`#${containerId} .active`);
            return active ? active.textContent.trim() : '';
        }

        // 獲取選中貨品
        function getSelectedProducts() {
            const items = [];
            document.querySelectorAll('#productItemList .product-item').forEach(item => {
                const name = item.querySelector('span').textContent;
                const count = item.querySelector('.count').textContent;
                if (count > 0) {
                    items.push(`${name} x${count}`);
                }
            });
            return items;
        }

        // 打開設定（需驗證密碼）
        let currentSettingsType = '';
        function openSettings(type) {
            currentSettingsType = type;
            document.getElementById('passwordModal').style.display = 'flex';
            document.getElementById('passwordInput').value = '';
        }

        // 關閉彈窗
        function closeModal() {
            document.getElementById('passwordModal').style.display = 'none';
        }

        // 驗證密碼
        function verifyPassword() {
            const input = document.getElementById('passwordInput').value;
            if (input === data.password) {
                closeModal();
                goToPage('settingsPage');
                if (currentSettingsType === 'customer') {
                    document.getElementById('productSettingsSection').style.display = 'none';
                } else {
                    document.getElementById('productSettingsSection').style.display = 'block';
                }
            } else {
                alert('密碼錯誤！');
            }
        }

        // 初始化設定頁
        function initSettingsPage() {
            renderSettingsList('settingsStaffList', data.staff, 'staff');
            renderSettingsList('settingsItemList', data.items, 'item');
        }

        // 渲染設定列表
        function renderSettingsList(containerId, list, type) {
            const container = document.getElementById(containerId);
            container.innerHTML = '';
            list.forEach((item, index) => {
                const div = document.createElement('div');
                div.className = 'list-item';
                div.innerHTML = `
                    <span>${item}</span>
                    <button class="delete-btn" onclick="deleteItem('${type}', ${index})">刪除</button>
                `;
                container.appendChild(div);
            });
        }

        // 新增員工
        function addStaff() {
            const name = prompt('請輸入員工姓名：');
            if (name) {
                data.staff.push(name);
                initSettingsPage();
            }
        }

        // 新增貨品
        function addItem() {
            const name = prompt('請輸入貨品名稱：');
            if (name) {
                data.items.push(name);
                initSettingsPage();
            }
        }

        // 刪除項目
        function deleteItem(type, index) {
            if (type === 'staff') data.staff.splice(index, 1);
            if (type === 'item') data.items.splice(index, 1);
            initSettingsPage();
        }

        // 修改密碼
        function changePassword() {
            const newPwd = document.getElementById('newPassword').value;
            if (newPwd) {
                data.password = newPwd;
                alert('密碼修改成功！');
                document.getElementById('newPassword').value = '';
            } else {
                alert('請輸入新密碼！');
            }
        }

        // 渲染紀錄
        function renderRecords() {
            renderRecordList('productRecordList', data.productRecords, 'product');
            renderRecordList('customerRecordList', data.customerRecords, 'customer');
        }

        // 渲染紀錄列表
        function renderRecordList(containerId, records, type) {
            const container = document.getElementById(containerId);
            container.innerHTML = '';
            records.forEach(record => {
                const div = document.createElement('div');
                div.className = 'record-item';
                if (type === 'product') {
                    div.innerHTML = `
                        <strong>${record.date}</strong><br>
                        員工：${record.staff}<br>
                        貨品：${record.items}<br>
                        金額：${record.price}<br>
                        支付：${record.payment}
                    `;
                } else {
                    div.innerHTML = `
                        <strong>${record.date}</strong><br>
                        員工：${record.staff}<br>
                        金額：${record.price}<br>
                        支付：${record.payment}
                    `;
                }
                container.appendChild(div);
            });
            if (records.length === 0) {
                container.innerHTML = '<div class="record-item">暫無紀錄</div>';
            }
        }

        // 切換紀錄顯示（密碼控制）
        function toggleRecord(type) {
            const password = prompt('請輸入密碼查看紀錄：');
            if (password === data.password) {
                const container = document.getElementById(type + 'RecordList');
                container.style.display = container.style.display === 'none' ? 'block' : 'none';
            } else {
                alert('密碼錯誤！');
            }
        }

        // 初始化
        window.onload = function() {
            renderRecords();
        };
    </script>
</body>
</html>
