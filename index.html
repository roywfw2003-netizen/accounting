<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>黑色會計管理系統 · Excel匯入版</title>
    <!-- XLSX 核心庫 (用於讀取 Excel) -->
    <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
        }

        body {
            background-color: #121212;
            color: #e0e0e0;
            padding: 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* 頂部導航 */
        .nav-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 24px;
            background: #1e1e1e;
            padding: 12px 20px;
            border-radius: 50px;
            border: 1px solid #333;
        }

        .nav-btn {
            background: #2d2d2d;
            border: none;
            color: #e0e0e0;
            padding: 10px 24px;
            border-radius: 40px;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            border: 1px solid #444;
            transition: all 0.2s;
        }

        .nav-btn.active {
            background: #0d6efd;
            color: white;
            border-color: #0d6efd;
        }

        /* 面板通用 */
        .panel {
            display: none;
            background: #1e1e1e;
            border-radius: 32px;
            padding: 24px;
            border: 1px solid #333;
        }

        .panel.active {
            display: block;
        }

        h2 {
            font-size: 1.6rem;
            font-weight: 400;
            margin-bottom: 20px;
            color: #fff;
            border-left: 5px solid #0d6efd;
            padding-left: 16px;
        }

        h3 {
            font-size: 1.2rem;
            margin: 20px 0 12px;
            color: #ccc;
        }

        /* 表單行（橫向滾動） */
        .form-row {
            display: flex;
            flex-wrap: nowrap;
            overflow-x: auto;
            gap: 16px;
            padding: 16px 8px;
            background: #2a2a2a;
            border-radius: 40px;
            margin-bottom: 20px;
            border: 1px solid #444;
            -webkit-overflow-scrolling: touch;
        }

        .form-group {
            min-width: 150px;
            flex: 0 0 auto;
        }

        .form-group label {
            display: block;
            font-size: 0.7rem;
            text-transform: uppercase;
            color: #aaa;
            margin-bottom: 6px;
        }

        .form-control {
            width: 100%;
            padding: 10px 14px;
            background: #3a3a3a;
            border: 1px solid #555;
            color: #fff;
            border-radius: 30px;
            font-size: 0.9rem;
            outline: none;
        }

        .form-control:focus {
            border-color: #0d6efd;
        }

        select.form-control {
            appearance: none;
            background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='16' height='16' viewBox='0 0 24 24' fill='none' stroke='%23aaa' stroke-width='2'><polyline points='6 9 12 15 18 9'/></svg>");
            background-repeat: no-repeat;
            background-position: right 12px center;
            background-size: 14px;
        }

        .btn {
            background: #0d6efd;
            color: white;
            border: none;
            padding: 10px 24px;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            border: 1px solid #0d6efd;
            transition: 0.2s;
        }

        .btn-secondary {
            background: #3a3a3a;
            border: 1px solid #555;
            color: #eee;
        }

        .btn-small {
            padding: 6px 16px;
            font-size: 0.8rem;
        }

        /* 記錄表格 */
        .records-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.85rem;
            background: #2a2a2a;
            border-radius: 24px;
            overflow-x: auto;
            display: block;
        }

        .records-table th,
        .records-table td {
            padding: 12px 8px;
            text-align: left;
            border-bottom: 1px solid #3a3a3a;
            white-space: nowrap;
        }

        .records-table th {
            background: #333;
            color: #ccc;
            font-weight: 400;
        }

        /* 統計表區域 */
        .stats-card {
            background: #2a2a2a;
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 24px;
        }

        .date-range {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            align-items: flex-end;
            margin-bottom: 20px;
        }

        .stats-result {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            justify-content: space-between;
        }

        .stats-total {
            background: #0d6efd20;
            border-radius: 24px;
            padding: 16px;
            flex: 1;
            text-align: center;
        }

        .stats-total .number {
            font-size: 2rem;
            font-weight: 600;
            color: #0d6efd;
        }

        .stats-method {
            flex: 2;
            background: #1e1e1e;
            border-radius: 24px;
            padding: 16px;
        }

        .stats-method table {
            width: 100%;
            border-collapse: collapse;
        }

        .stats-method td {
            padding: 8px;
            border-bottom: 1px solid #333;
        }

        /* CSV / Excel 上傳區域 */
        .upload-area {
            background: #2a2a2a;
            border-radius: 40px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .upload-area input[type="file"] {
            margin: 12px 0;
        }

        .result-area, .stats-area {
            margin-top: 20px;
            background: #333;
            border-radius: 24px;
            padding: 16px;
        }

        .result-area table, .stats-area table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 12px;
        }

        .result-area th, .result-area td,
        .stats-area th, .stats-area td {
            padding: 8px;
            border-bottom: 1px solid #444;
            text-align: left;
        }

        /* 密碼彈窗 */
        .password-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .password-box {
            background: #2a2a2a;
            border-radius: 40px;
            padding: 30px;
            width: 300px;
            border: 1px solid #555;
        }

        /* 手機調整 */
        @media (max-width: 640px) {
            .form-group {
                min-width: 130px;
            }
            .nav-btn {
                padding: 6px 16px;
                font-size: 0.85rem;
            }
        }

        .hidden {
            display: none;
        }
    </style>
</head>
<body>
<div class="container">
    <!-- 頂部導航按鈕 -->
    <div class="nav-bar">
        <button class="nav-btn active" data-panel="main">🏠 主頁</button>
        <button class="nav-btn" data-panel="admin">🔐 管理員</button>
    </div>

    <!-- 主頁面板 -->
    <div id="mainPanel" class="panel active">
        <div style="margin-bottom: 20px;">
            <button id="mainOptionBtn" class="btn" style="background: #2d2d2d; border-color: #0d6efd;">1.選項</button>
            <button id="csvBtn" class="btn btn-secondary" style="margin-left: 12px;">📂 CSV 匯入</button>
            <button id="excelBtn" class="btn btn-secondary" style="margin-left: 12px;">📊 Excel 匯入</button>
        </div>

        <!-- 手動輸入表單 (1.選項) -->
        <div id="formContainer" style="display: none;">
            <div class="form-row" id="inputRow"></div>
            <div style="text-align: right; margin-top: 12px;">
                <button id="submitRecordBtn" class="btn">確定完成</button>
            </div>
        </div>

        <!-- CSV 上傳區域 -->
        <div id="csvContainer" style="display: none;">
            <div class="upload-area">
                <h3>📁 上傳 CSV 檔案 (UTF-8)</h3>
                <input type="file" id="csvFileInput" accept=".csv">
                <button id="uploadCsvBtn" class="btn">匯入並儲存</button>
                <p style="font-size: 0.8rem; color: #aaa; margin-top: 10px;">
                    CSV 格式：A 欄為日期時間，B 欄為項目（人名），C 欄為金額。系統會自動解析 A 欄的日期時間格式。
                </p>
            </div>
        </div>

        <!-- Excel 上傳區域 (新增) -->
        <div id="excelContainer" style="display: none;">
            <div class="upload-area">
                <h3>📊 上傳 Excel 檔案 (.xlsx, .xls)</h3>
                <input type="file" id="excelFileInput" accept=".xlsx,.xls">
                <button id="uploadExcelBtn" class="btn">解析並匯入</button>
                <p style="font-size: 0.8rem; color: #aaa; margin-top: 10px;">
                    只擷取 A 欄含有「日期+時間」格式的行，並自動提取該行中的英文姓名與數字金額。匯入後將儲存至 Google Sheets 並更新統計。
                </p>

                <!-- 解析結果表格 -->
                <div id="excelResultArea" class="result-area hidden">
                    <h4>✅ 解析結果（將匯入以下記錄）</h4>
                    <div style="overflow-x: auto;">
                        <table id="excelPreviewTable">
                            <thead>
                                <tr><th>日期時間</th><th>姓名</th><th>金額</th></tr>
                            </thead>
                            <tbody></tbody>
                        </table>
                    </div>
                </div>

                <!-- 統計摘要 -->
                <div id="excelStatsArea" class="stats-area hidden">
                    <h4>📈 即時統計</h4>
                    <div id="excelTotalAmount"></div>
                    <div id="excelStaffStats"></div>
                    <div id="excelDailyStats"></div>
                </div>
            </div>
        </div>

        <!-- 統計表 (原有) -->
        <div class="stats-card">
            <h3>📊 統計表</h3>
            <div class="date-range">
                <div class="form-group" style="min-width: 140px;">
                    <label>開始日期</label>
                    <input type="date" id="startDate" class="form-control">
                </div>
                <div class="form-group" style="min-width: 140px;">
                    <label>結束日期</label>
                    <input type="date" id="endDate" class="form-control">
                </div>
                <button id="updateStatsBtn" class="btn btn-small">更新統計</button>
            </div>
            <div id="statsResult" class="stats-result">
                <!-- 動態顯示統計 -->
            </div>
        </div>

        <!-- 記錄列表 -->
        <h3>📋 支出記錄</h3>
        <div id="recordsList" style="overflow-x: auto;">
            <table class="records-table">
                <thead id="recordsHeader"></thead>
                <tbody id="recordsBody"></tbody>
            </table>
        </div>
    </div>

    <!-- 管理員面板 (密碼保護) -->
    <div id="adminPanel" class="panel">
        <h2>🔐 管理員設定</h2>
        <div style="background: #2a2a2a; border-radius: 32px; padding: 20px;">
            <div class="form-group" style="margin-bottom: 16px;">
                <label>主頁按鈕文字</label>
                <input type="text" id="adminBtnLabel" class="form-control" value="1.選項">
            </div>
            <div class="form-group" style="margin-bottom: 16px;">
                <label>六個欄位標籤 (用逗號分隔)</label>
                <input type="text" id="adminFieldLabels" class="form-control" value="項目,交付日期,期間,支出方式,金額,備注">
            </div>
            <div class="form-group" style="margin-bottom: 16px;">
                <label>支出方式選項 (用逗號分隔)</label>
                <input type="text" id="adminPaymentOptions" class="form-control" value="現金,支付寶,PayMe,微信支付,個人Visa,個人轉數快,個人戶口,公司扣賬卡,公司轉數快,公司戶口">
            </div>
            <button id="saveAdminSettings" class="btn">儲存設定</button>
            <button id="resetAdminSettings" class="btn btn-secondary" style="margin-left: 12px;">重置預設</button>
        </div>
    </div>
</div>

<!-- 密碼輸入彈窗 -->
<div id="passwordOverlay" class="password-overlay" style="display:none;">
    <div class="password-box">
        <h3>管理員密碼</h3>
        <input type="password" id="adminPwdInput" class="form-control" style="margin: 12px 0;">
        <div style="display: flex; gap: 12px;">
            <button id="adminPwdConfirm" class="btn">確認</button>
            <button id="adminPwdCancel" class="btn-secondary">取消</button>
        </div>
    </div>
</div>

<script>
    // ========== 設定 ==========
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxhMFhXz5CjiggUOrOM261fSklNuh-2Ms4hvKV1SdFrdTbARQlDLP8olVhJovkrm4Na/exec';
    const ADMIN_PASSWORD = 'admin123';
    const DEFAULT_SETTINGS = {
        mainBtnLabel: '1.選項',
        fieldLabels: ['項目', '交付日期', '期間', '支出方式', '金額', '備注'],
        paymentOptions: ['現金', '支付寶', 'PayMe', '微信支付', '個人Visa', '個人轉數快', '個人戶口', '公司扣賬卡', '公司轉數快', '公司戶口']
    };

    let allRecords = [];
    let currentSettings = { ...DEFAULT_SETTINGS };

    // ========== 通用輔助函數 ==========
    function loadSettings() {
        const saved = localStorage.getItem('accounting_settings');
        if (saved) {
            try {
                const s = JSON.parse(saved);
                currentSettings = { ...DEFAULT_SETTINGS, ...s };
            } catch(e) {}
        } else {
            currentSettings = { ...DEFAULT_SETTINGS };
        }
        document.getElementById('adminBtnLabel').value = currentSettings.mainBtnLabel;
        document.getElementById('adminFieldLabels').value = currentSettings.fieldLabels.join(',');
        document.getElementById('adminPaymentOptions').value = currentSettings.paymentOptions.join(',');
        document.getElementById('mainOptionBtn').innerText = currentSettings.mainBtnLabel;
    }

    function saveSettings() {
        localStorage.setItem('accounting_settings', JSON.stringify(currentSettings));
    }

    // 生成表單HTML
    function buildFormHtml() {
        const labels = currentSettings.fieldLabels;
        const paymentOptions = currentSettings.paymentOptions;
        const today = new Date().toISOString().slice(0,10);
        const months = ['', '1月', '2月', '3月', '4月', '5月', '6月', '7月', '8月', '9月', '10月', '11月', '12月'];
        let html = '';
        // 項目
        html += `<div class="form-group"><label>${labels[0]}</label><input type="text" id="field0" class="form-control" autocomplete="off"></div>`;
        // 交付日期
        html += `<div class="form-group"><label>${labels[1]}</label><input type="date" id="field1" class="form-control" value="${today}"></div>`;
        // 期間
        let periodSelect = `<div class="form-group"><label>${labels[2]}</label><select id="field2" class="form-control">`;
        months.forEach(m => periodSelect += `<option value="${m}">${m}</option>`);
        periodSelect += `</select></div>`;
        html += periodSelect;
        // 支出方式
        let paymentSelect = `<div class="form-group"><label>${labels[3]}</label><select id="field3" class="form-control">`;
        paymentOptions.forEach(opt => paymentSelect += `<option value="${opt}">${opt}</option>`);
        paymentSelect += `</select></div>`;
        html += paymentSelect;
        // 金額
        html += `<div class="form-group"><label>${labels[4]}</label><input type="number" step="0.01" id="field4" class="form-control"></div>`;
        // 備注
        html += `<div class="form-group"><label>${labels[5]}</label><input type="text" id="field5" class="form-control"></div>`;
        return html;
    }

    function rebuildForm() {
        const container = document.getElementById('inputRow');
        container.innerHTML = buildFormHtml();
        const inputs = container.querySelectorAll('.form-control');
        for (let i = 0; i < inputs.length; i++) {
            inputs[i].addEventListener('keydown', (e) => {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    if (i === inputs.length - 1) {
                        document.getElementById('submitRecordBtn').click();
                    } else {
                        inputs[i+1].focus();
                    }
                }
            });
        }
    }

    // 儲存一筆記錄到 Google Sheets 與本地
    function appendRecordToGoogle(record) {
        const iframe = document.createElement('iframe');
        iframe.style.display = 'none';
        iframe.name = 'iframe_' + Date.now();
        document.body.appendChild(iframe);
        const form = document.createElement('form');
        form.method = 'POST';
        form.action = SCRIPT_URL;
        form.target = iframe.name;
        form.style.display = 'none';
        form.innerHTML = `
            <input name="action" value="append">
            <input name="sheet" value="支出記錄">
            <input name="data" value='${JSON.stringify(record)}'>
        `;
        document.body.appendChild(form);
        form.submit();
        setTimeout(() => {
            form.remove();
            iframe.remove();
        }, 2000);
    }

    // 儲存記錄（同時存本地與雲端）
    function saveRecordToAll(record) {
        allRecords.push(record);
        localStorage.setItem('accounting_records', JSON.stringify(allRecords));
        appendRecordToGoogle(record);
        renderRecords();
        updateStatistics();
    }

    // 讀取記錄 (優先使用本地快取，再從 Google 載入)
    async function loadRecordsFromGoogle() {
        return new Promise((resolve) => {
            const callbackName = 'jsonp_cb_' + Date.now();
            window[callbackName] = function(data) {
                delete window[callbackName];
                if (data && !data.error && Array.isArray(data)) {
                    allRecords = data;
                    localStorage.setItem('accounting_records', JSON.stringify(data));
                } else {
                    const local = localStorage.getItem('accounting_records');
                    if (local) allRecords = JSON.parse(local);
                }
                renderRecords();
                updateStatistics();
                resolve();
            };
            const script = document.createElement('script');
            script.src = `${SCRIPT_URL}?action=getAll&callback=${callbackName}`;
            document.body.appendChild(script);
            setTimeout(() => {
                if (window[callbackName]) {
                    delete window[callbackName];
                    const local = localStorage.getItem('accounting_records');
                    if (local) allRecords = JSON.parse(local);
                    renderRecords();
                    updateStatistics();
                    resolve();
                }
            }, 5000);
        });
    }

    // 渲染記錄列表
    function renderRecords() {
        const thead = document.getElementById('recordsHeader');
        const tbody = document.getElementById('recordsBody');
        const labels = currentSettings.fieldLabels;
        thead.innerHTML = `<tr>${labels.map(l => `<th>${l}</th>`).join('')}</tr>`;
        if (allRecords.length === 0) {
            tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;">尚無記錄</td></tr>';
            return;
        }
        const sorted = [...allRecords].sort((a,b) => (b.timestamp || 0) - (a.timestamp || 0));
        tbody.innerHTML = sorted.map(rec => `
            <tr>
                <td>${rec.project || ''}</td>
                <td>${rec.date || ''}</td>
                <td>${rec.period || ''}</td>
                <td>${rec.payment || ''}</td>
                <td>${rec.amount ? rec.amount.toFixed(2) : ''}</td>
                <td>${rec.remark || ''}</td>
            </tr>
        `).join('');
    }

    // 統計表更新
    function updateStatistics() {
        let start = document.getElementById('startDate').value;
        let end = document.getElementById('endDate').value;
        if (!start || !end) {
            const now = new Date();
            const firstDay = new Date(now.getFullYear(), now.getMonth(), 1).toISOString().slice(0,10);
            const lastDay = new Date(now.getFullYear(), now.getMonth()+1, 0).toISOString().slice(0,10);
            start = firstDay;
            end = lastDay;
            document.getElementById('startDate').value = start;
            document.getElementById('endDate').value = end;
        }
        const filtered = allRecords.filter(rec => rec.date && rec.date >= start && rec.date <= end);
        const total = filtered.reduce((s, r) => s + (r.amount || 0), 0);
        const methodMap = new Map();
        filtered.forEach(r => {
            const m = r.payment || '未分類';
            methodMap.set(m, (methodMap.get(m) || 0) + (r.amount || 0));
        });
        const methodList = Array.from(methodMap.entries()).sort((a,b) => b[1] - a[1]);
        let methodHtml = '<table><tr><th>支付方式</th><th>總金額</th></tr>';
        methodList.forEach(([m, amt]) => {
            methodHtml += `<tr><td>${m}</td><td>$${amt.toFixed(2)}</td></tr>`;
        });
        methodHtml += '</table>';
        document.getElementById('statsResult').innerHTML = `
            <div class="stats-total">
                <div>總支出</div>
                <div class="number">$${total.toFixed(2)}</div>
            </div>
            <div class="stats-method">
                <div>支出方式統計</div>
                ${methodHtml}
            </div>
        `;
    }

    // 手動新增記錄
    function saveManualRecord() {
        const project = document.getElementById('field0').value.trim();
        const date = document.getElementById('field1').value;
        const period = document.getElementById('field2').value;
        const payment = document.getElementById('field3').value;
        const amount = parseFloat(document.getElementById('field4').value) || 0;
        const remark = document.getElementById('field5').value.trim();
        if (!project || !date || amount <= 0) {
            alert('請填寫項目、日期且金額大於0');
            return;
        }
        const newRecord = {
            project, date, period, payment, amount, remark,
            timestamp: Date.now()
        };
        saveRecordToAll(newRecord);
        document.getElementById('field0').value = '';
        document.getElementById('field4').value = '';
        document.getElementById('field5').value = '';
    }

    // ========== CSV 匯入 (原有) ==========
    function importCsv(file) {
        const reader = new FileReader();
        reader.onload = (e) => {
            const text = e.target.result;
            const lines = text.split(/\r?\n/);
            if (lines.length === 0) return;
            const data = lines.map(line => line.split(',').map(cell => cell.trim()));
            const dateTimeRegex = /(\d{1,2}\/\d{1,2}\/\d{4}\s+\d{1,2}:\d{2}:\d{2})/;
            let importedCount = 0;
            for (let i = 0; i < data.length; i++) {
                const row = data[i];
                if (row.length < 3) continue;
                const cellA = row[0];
                if (dateTimeRegex.test(cellA)) {
                    const project = row[1] || '';
                    const amount = parseFloat(row[2]) || 0;
                    if (amount <= 0) continue;
                    const newRecord = {
                        project,
                        date: cellA,
                        period: '',
                        payment: '',
                        amount,
                        remark: '',
                        timestamp: Date.now() + importedCount
                    };
                    saveRecordToAll(newRecord);
                    importedCount++;
                }
            }
            if (importedCount > 0) {
                alert(`成功匯入 ${importedCount} 筆記錄`);
            } else {
                alert('找不到符合日期時間格式的資料');
            }
        };
        reader.readAsText(file, 'UTF-8');
    }

    // ========== Excel 匯入 (新增，取自用戶提供的版本) ==========
    const DATE_REGEX = /^\d{1,2}\/\d{1,2}\/\d{2,4}\s+\d{1,2}:\d{2}/;  // 匹配 日/月/年 時:分

    function parseExcelAndImport(file) {
        const reader = new FileReader();
        reader.onload = (e) => {
            const data = new Uint8Array(e.target.result);
            const workbook = XLSX.read(data, { type: 'array' });
            const sheet = workbook.Sheets[workbook.SheetNames[0]];
            const rows = XLSX.utils.sheet_to_json(sheet, { header: 1, defval: '' });

            const list = [];
            for (let i = 0; i < rows.length; i++) {
                const row = rows[i];
                const datetime = (row[0] || '').toString().trim();

                // 只保留符合日期時間格式的行
                if (!DATE_REGEX.test(datetime)) continue;

                let name = '';
                let amount = 0;
                // 掃描整行，找出英文字母的姓名和數字金額
                for (let cell of row) {
                    const val = (cell || '').toString().trim();
                    if (!name && /^[A-Za-z]+$/.test(val)) name = val;
                    if (amount === 0 && /^\d+(\.\d+)?$/.test(val)) amount = parseFloat(val);
                }

                list.push({
                    datetime,
                    name: name || '（無名字）',
                    amount: amount || 0
                });
            }

            if (list.length === 0) {
                alert('未找到任何符合日期時間格式的資料');
                return;
            }

            // 顯示預覽表格與統計
            const previewTbody = document.querySelector('#excelPreviewTable tbody');
            previewTbody.innerHTML = list.map(item => `
                <tr>
                    <td>${item.datetime}</td>
                    <td>${item.name}</td>
                    <td>${item.amount.toFixed(2)}</td>
                </tr>
            `).join('');
            document.getElementById('excelResultArea').classList.remove('hidden');

            // 統計
            const total = list.reduce((s, i) => s + i.amount, 0);
            const staffMap = {};
            list.forEach(item => {
                staffMap[item.name] = (staffMap[item.name] || 0) + item.amount;
            });
            const dailyMap = {};
            list.forEach(item => {
                const date = item.datetime.split(' ')[0];
                dailyMap[date] = (dailyMap[date] || 0) + 1;
            });

            document.getElementById('excelTotalAmount').innerHTML = `<strong>總金額：</strong> ${total.toFixed(2)}`;
            document.getElementById('excelStaffStats').innerHTML = `<strong>每位髮型師總金額：</strong><br>${Object.entries(staffMap).map(([n,a]) => `${n}：${a.toFixed(2)}`).join('<br>')}`;
            document.getElementById('excelDailyStats').innerHTML = `<strong>每日客人數：</strong><br>${Object.entries(dailyMap).map(([d,c]) => `${d}：${c} 位`).join('<br>')}`;
            document.getElementById('excelStatsArea').classList.remove('hidden');

            // 確認是否匯入
            if (confirm(`共解析出 ${list.length} 筆有效資料，確定要匯入系統嗎？`)) {
                let importedCount = 0;
                for (let item of list) {
                    const newRecord = {
                        project: item.name,
                        date: item.datetime,
                        period: '',
                        payment: '',
                        amount: item.amount,
                        remark: '',
                        timestamp: Date.now() + importedCount
                    };
                    saveRecordToAll(newRecord);
                    importedCount++;
                }
                alert(`成功匯入 ${importedCount} 筆記錄`);
                // 清空上傳區域，隱藏結果
                document.getElementById('excelFileInput').value = '';
                document.getElementById('excelResultArea').classList.add('hidden');
                document.getElementById('excelStatsArea').classList.add('hidden');
            }
        };
        reader.readAsArrayBuffer(file);
    }

    // ========== 管理員密碼邏輯 ==========
    function showAdminPassword() {
        const overlay = document.getElementById('passwordOverlay');
        overlay.style.display = 'flex';
    }
    document.getElementById('adminPwdConfirm').onclick = () => {
        const pwd = document.getElementById('adminPwdInput').value;
        if (pwd === ADMIN_PASSWORD) {
            document.getElementById('passwordOverlay').style.display = 'none';
            document.getElementById('mainPanel').classList.remove('active');
            document.getElementById('adminPanel').classList.add('active');
            document.querySelectorAll('.nav-btn').forEach(btn => {
                if (btn.dataset.panel === 'admin') btn.classList.add('active');
                else btn.classList.remove('active');
            });
        } else {
            alert('密碼錯誤');
        }
        document.getElementById('adminPwdInput').value = '';
    };
    document.getElementById('adminPwdCancel').onclick = () => {
        document.getElementById('passwordOverlay').style.display = 'none';
    };

    // 管理員設定儲存
    document.getElementById('saveAdminSettings').addEventListener('click', () => {
        const newBtnLabel = document.getElementById('adminBtnLabel').value.trim();
        const labelsStr = document.getElementById('adminFieldLabels').value;
        const paymentStr = document.getElementById('adminPaymentOptions').value;
        const newLabels = labelsStr.split(',').map(s => s.trim());
        const newPayments = paymentStr.split(',').map(s => s.trim());
        if (newLabels.length !== 6) {
            alert('欄位標籤必須為6個，用逗號分隔');
            return;
        }
        currentSettings = {
            mainBtnLabel: newBtnLabel,
            fieldLabels: newLabels,
            paymentOptions: newPayments
        };
        saveSettings();
        document.getElementById('mainOptionBtn').innerText = currentSettings.mainBtnLabel;
        rebuildForm();
        renderRecords();
        alert('設定已儲存');
    });
    document.getElementById('resetAdminSettings').addEventListener('click', () => {
        currentSettings = { ...DEFAULT_SETTINGS };
        saveSettings();
        document.getElementById('adminBtnLabel').value = currentSettings.mainBtnLabel;
        document.getElementById('adminFieldLabels').value = currentSettings.fieldLabels.join(',');
        document.getElementById('adminPaymentOptions').value = currentSettings.paymentOptions.join(',');
        document.getElementById('mainOptionBtn').innerText = currentSettings.mainBtnLabel;
        rebuildForm();
        renderRecords();
        alert('已重置為預設');
    });

    // ========== 頁面切換與按鈕展開/收合 ==========
    let isFormVisible = false, isCsvVisible = false, isExcelVisible = false;
    document.getElementById('mainOptionBtn').addEventListener('click', () => {
        if (!isFormVisible) {
            rebuildForm();
            document.getElementById('formContainer').style.display = 'block';
            isFormVisible = true;
            if (isCsvVisible) { document.getElementById('csvContainer').style.display = 'none'; isCsvVisible = false; }
            if (isExcelVisible) { document.getElementById('excelContainer').style.display = 'none'; isExcelVisible = false; }
        } else {
            document.getElementById('formContainer').style.display = 'none';
            isFormVisible = false;
        }
    });
    document.getElementById('csvBtn').addEventListener('click', () => {
        if (!isCsvVisible) {
            document.getElementById('csvContainer').style.display = 'block';
            isCsvVisible = true;
            if (isFormVisible) { document.getElementById('formContainer').style.display = 'none'; isFormVisible = false; }
            if (isExcelVisible) { document.getElementById('excelContainer').style.display = 'none'; isExcelVisible = false; }
        } else {
            document.getElementById('csvContainer').style.display = 'none';
            isCsvVisible = false;
        }
    });
    document.getElementById('excelBtn').addEventListener('click', () => {
        if (!isExcelVisible) {
            document.getElementById('excelContainer').style.display = 'block';
            isExcelVisible = true;
            if (isFormVisible) { document.getElementById('formContainer').style.display = 'none'; isFormVisible = false; }
            if (isCsvVisible) { document.getElementById('csvContainer').style.display = 'none'; isCsvVisible = false; }
        } else {
            document.getElementById('excelContainer').style.display = 'none';
            isExcelVisible = false;
        }
    });

    document.getElementById('submitRecordBtn').addEventListener('click', saveManualRecord);
    document.getElementById('uploadCsvBtn').addEventListener('click', () => {
        const file = document.getElementById('csvFileInput').files[0];
        if (!file) { alert('請選擇 CSV 檔案'); return; }
        importCsv(file);
    });
    document.getElementById('uploadExcelBtn').addEventListener('click', () => {
        const file = document.getElementById('excelFileInput').files[0];
        if (!file) { alert('請選擇 Excel 檔案'); return; }
        parseExcelAndImport(file);
    });
    document.getElementById('updateStatsBtn').addEventListener('click', updateStatistics);

    // 頁面導航
    document.querySelectorAll('.nav-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            const target = btn.dataset.panel;
            if (target === 'admin') {
                showAdminPassword();
            } else {
                document.getElementById('mainPanel').classList.add('active');
                document.getElementById('adminPanel').classList.remove('active');
                document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
            }
        });
    });

    // 初始化
    async function init() {
        loadSettings();
        rebuildForm();
        await loadRecordsFromGoogle();
        // 預設關閉所有展開區域
        document.getElementById('formContainer').style.display = 'none';
        document.getElementById('csvContainer').style.display = 'none';
        document.getElementById('excelContainer').style.display = 'none';
        isFormVisible = false;
        isCsvVisible = false;
        isExcelVisible = false;
    }
    init();
</script>
</body>
</html>
