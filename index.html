<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <title>支出管理系統 version 1</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft JhengHei", sans-serif;
        }
        body {
            background: #111;
            color: #eee;
            padding: 20px;
        }
        .version {
            position: fixed;
            top: 10px;
            left: 10px;
            background: #66f;
            color: #000;
            padding: 5px 10px;
            border-radius: 5px;
            font-weight: bold;
        }
        .container {
            max-width: 1200px;
            margin: auto;
        }
        .nav {
            display: flex;
            justify-content: space-between;
            background: #222;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        .nav a {
            color: #fff;
            background: #333;
            padding: 8px 15px;
            border-radius: 5px;
            text-decoration: none;
        }
        .nav a:hover {
            background: #66f;
        }
        .section {
            background: #222;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        .title {
            color: #66f;
            margin-bottom: 15px;
        }
        .form-grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 10px;
            margin-bottom: 15px;
        }
        input, select, textarea {
            padding: 10px;
            background: #333;
            border: 1px solid #444;
            border-radius: 5px;
            color: #eee;
        }
        .btn {
            padding: 10px 20px;
            background: #66f;
            border: none;
            border-radius: 5px;
            color: #000;
            cursor: pointer;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }
        th, td {
            padding: 10px;
            border-bottom: 1px solid #444;
            text-align: left;
        }
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .modal-content {
            background: #222;
            padding: 30px;
            border-radius: 8px;
            width: 350px;
        }
        .hidden {
            display: none;
        }
        .result-area {
            margin-top: 20px;
            padding: 15px;
            background: #333;
            border-radius: 8px;
        }
        .stats-area {
            margin-top: 20px;
            padding: 15px;
            background: #444;
            border-radius: 8px;
        }
        .stats-title {
            color: #66f;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <div class="version">version 1</div>
    <div class="container">
        <div class="nav">
            <h2>支出管理系統</h2>
            <div>
                <a href="#" id="homeBtn">主頁</a>
                <a href="#" id="adminBtn">管理員</a>
            </div>
        </div>

        <div id="home" class="section">
            <h3 class="title">支出記錄</h3>
            <div class="form-grid">
                <div>
                    <label>項目</label>
                    <input id="item">
                </div>
                <div>
                    <label>交付日期</label>
                    <input id="date">
                </div>
                <div>
                    <label>期間</label>
                    <select id="month">
                        <option value="">選擇月份</option>
                        <option>1月</option><option>2月</option><option>3月</option>
                        <option>4月</option><option>5月</option><option>6月</option>
                        <option>7月</option><option>8月</option><option>9月</option>
                        <option>10月</option><option>11月</option><option>12月</option>
                    </select>
                </div>
                <div>
                    <label>支出方式</label>
                    <select id="pay">
                        <option value="">選擇方式</option>
                        <option>現金</option><option>支付寶</option><option>PayMe</option>
                        <option>微信支付</option><option>個人Visa</option><option>個人轉數快</option>
                        <option>個人戶口</option><option>公司扣賬卡</option><option>公司轉數快</option>
                        <option>公司戶口</option>
                    </select>
                </div>
                <div>
                    <label>金額</label>
                    <input type="number" id="amount">
                </div>
                <div>
                    <label>備注</label>
                    <textarea id="remark"></textarea>
                </div>
            </div>
            <button class="btn" id="submit">確定完成</button>
        </div>

        <div class="section">
            <h3 class="title">儲存紀錄</h3>
            <table>
                <thead>
                    <tr>
                        <th>項目</th><th>日期</th><th>期間</th><th>方式</th><th>金額</th><th>備注</th>
                    </tr>
                </thead>
                <tbody id="records"></tbody>
            </table>
        </div>

        <div id="admin" class="section hidden">
            <h3 class="title">CSV / Excel 匯入（嚴格日期過濾）</h3>
            <p>只計算有「日期+時間」的行，其他字眼全部忽略</p>
            <input type="file" id="file" accept=".csv,.xlsx,.xls">
            <button class="btn" id="parse">解析並匯入</button>
            <p id="result"></p>

            <div class="result-area">
                <h4>已讀取資料（僅日期時間行）</h4>
                <table>
                    <thead>
                        <tr>
                            <th>日期時間</th><th>名字</th><th>金額</th>
                        </tr>
                    </thead>
                    <tbody id="csvTable"></tbody>
                </table>
            </div>

            <div class="stats-area" id="statsArea">
                <h4 class="stats-title">統計結果</h4>
                <div id="totalAmount"></div>
                <div id="staffStats"></div>
                <div id="dailyStats"></div>
            </div>
        </div>

        <div id="modal" class="modal hidden">
            <div class="modal-content">
                <h3 class="title">管理員密碼</h3>
                <input type="password" id="pwd" style="width:100%; margin:10px 0;">
                <button class="btn" id="login">登入</button>
                <p id="err" style="color:red; margin-top:10px;"></p>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
    <script>
        const ADMIN_PWD = "admin123";
        const GAS_URL = "https://script.google.com/macros/s/AKfycbyuxyXs2qIp6fuTDCg3YSFMOlMRnJY8Cbjn7x6JRiT-LSQrmbVGan8l623JpzYk3AKGew/exec";
        const DATE_REGEX = /^\d{1,2}\/\d{1,2}\/\d{2,4}\s+\d{1,2}:\d{2}/;

        flatpickr("#date", { dateFormat: "Y-m-d", defaultDate: new Date() });

        document.getElementById("adminBtn").onclick = () => {
            document.getElementById("modal").classList.remove("hidden");
        };
        document.getElementById("homeBtn").onclick = () => {
            document.getElementById("admin").classList.add("hidden");
            document.getElementById("home").classList.remove("hidden");
        };
        document.getElementById("login").onclick = () => {
            if (document.getElementById("pwd").value === ADMIN_PWD) {
                document.getElementById("modal").classList.add("hidden");
                document.getElementById("home").classList.add("hidden");
                document.getElementById("admin").classList.remove("hidden");
            } else {
                document.getElementById("err").textContent = "密碼錯誤";
            }
        };

        document.getElementById("submit").onclick = async () => {
            const data = {
                item: document.getElementById("item").value,
                date: document.getElementById("date").value,
                month: document.getElementById("month").value,
                pay: document.getElementById("pay").value,
                amount: document.getElementById("amount").value,
                remark: document.getElementById("remark").value
            };
            await fetch(GAS_URL, {
                method: "POST",
                body: JSON.stringify({ action: "saveRecord", data })
            });
            loadRecords();
        };

        async function loadRecords() {
            const res = await fetch(GAS_URL, {
                method: "POST",
                body: JSON.stringify({ action: "getRecords" })
            });
            const json = await res.json();
            const tbody = document.getElementById("records");
            tbody.innerHTML = "";
            json.records.forEach(r => {
                tbody.innerHTML += `<tr>
                    <td>${r.item}</td>
                    <td>${r.deliveryDate}</td>
                    <td>${r.period}</td>
                    <td>${r.paymentMethod}</td>
                    <td>${r.amount}</td>
                    <td>${r.remark}</td>
                </tr>`;
            });
        }

        document.getElementById("parse").onclick = () => {
            const file = document.getElementById("file").files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = e => {
                const data = new Uint8Array(e.target.result);
                const wb = XLSX.read(data, { type: "array" });
                const ws = wb.Sheets[wb.SheetNames[0]];
                const arr = XLSX.utils.sheet_to_json(ws, { header: 1 });

                const list = [];
                for (let i = 0; i < arr.length; i++) {
                    const row = arr[i];
                    const datetime = (row[0] || "").toString().trim();

                    // 嚴格過濾：只保留符合日期時間格式的行
                    if (!DATE_REGEX.test(datetime)) continue;

                    let name = "";
                    let amount = "";

                    for (let cell of row) {
                        const val = (cell || "").toString().trim();
                        if (!name && /^[A-Za-z]+$/.test(val)) name = val;
                        if (!amount && /^\d+(\.\d+)?$/.test(val)) amount = val;
                    }

                    list.push({
                        datetime,
                        name: name || "（無名字）",
                        amount: parseFloat(amount) || 0
                    });
                }

                const tbody = document.getElementById("csvTable");
                tbody.innerHTML = "";
                list.forEach(item => {
                    tbody.innerHTML += `<tr>
                        <td>${item.datetime}</td>
                        <td>${item.name}</td>
                        <td>${item.amount}</td>
                    </tr>`;
                });

                calculateStats(list);
                document.getElementById("result").textContent = `成功讀取 ${list.length} 筆有效資料`;

                fetch(GAS_URL, {
                    method: "POST",
                    body: JSON.stringify({ action: "importCsvData", data: list })
                });
            };
            reader.readAsArrayBuffer(file);
        };

        function calculateStats(data) {
            const totalAmount = data.reduce((sum, item) => sum + item.amount, 0);
            document.getElementById("totalAmount").innerHTML = `<strong>總金額：</strong> ${totalAmount.toFixed(2)}`;

            const staffMap = {};
            data.forEach(item => {
                const name = item.name || "（無名字）";
                staffMap[name] = (staffMap[name] || 0) + item.amount;
            });

            let staffHtml = "<strong>每位髮型師總金額：</strong><br>";
            for (const [name, amount] of Object.entries(staffMap)) {
                staffHtml += `${name}：${amount.toFixed(2)}<br>`;
            }
            document.getElementById("staffStats").innerHTML = staffHtml;

            const dailyMap = {};
            data.forEach(item => {
                const date = item.datetime.split(" ")[0];
                dailyMap[date] = (dailyMap[date] || 0) + 1;
            });

            let dailyHtml = "<strong>每日客人數：</strong><br>";
            for (const [date, count] of Object.entries(dailyMap)) {
                dailyHtml += `${date}：${count} 位客人<br>`;
            }
            document.getElementById("dailyStats").innerHTML = dailyHtml;
        }

        loadRecords();
    </script>
</body>
</html>
