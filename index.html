<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>支出管理系統（最終版）</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Microsoft JhengHei', sans-serif;
        }
        body {
            background-color: #0f0f0f;
            color: #f5f5f5;
            padding: 20px;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        .nav {
            display: flex;
            justify-content: space-between;
            background-color: #1a1a1a;
            padding: 18px 25px;
            border-radius: 10px;
            margin-bottom: 30px;
        }
        .nav h1 {
            color: #6366f1;
        }
        .nav a {
            color: #f5f5f5;
            padding: 10px 20px;
            background-color: #2d2d2d;
            border-radius: 6px;
            text-decoration: none;
        }
        .nav a:hover {
            background-color: #6366f1;
            color: #0f0f0f;
        }
        .form-section {
            background-color: #1a1a1a;
            padding: 30px;
            border-radius: 10px;
            margin-bottom: 30px;
        }
        .form-title {
            color: #6366f1;
            margin-bottom: 25px;
            font-size: 20px;
        }
        .form-grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 15px;
            margin-bottom: 25px;
        }
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        input, select, textarea {
            padding: 12px;
            background-color: #2d2d2d;
            border: 1px solid #404040;
            border-radius: 6px;
            color: #f5f5f5;
        }
        .btn {
            padding: 12px 30px;
            background-color: #6366f1;
            color: #0f0f0f;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }
        .records-section {
            background-color: #1a1a1a;
            padding: 30px;
            border-radius: 10px;
        }
        .records-table {
            width: 100%;
            border-collapse: collapse;
        }
        .records-table th, .records-table td {
            padding: 15px;
            border-bottom: 1px solid #303030;
            text-align: left;
        }
        .csv-section {
            background-color: #1a1a1a;
            padding: 30px;
            border-radius: 10px;
        }
        .file-input {
            margin: 15px 0;
            padding: 12px;
            background-color: #2d2d2d;
            border-radius: 6px;
            color: #f5f5f5;
        }
        .password-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.9);
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .password-form {
            background-color: #1a1a1a;
            padding: 40px;
            border-radius: 10px;
            width: 400px;
        }
        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="nav">
            <h1>支出管理系統</h1>
            <div>
                <a href="#" id="home-link">主頁</a>
                <a href="#" id="admin-link">管理員</a>
            </div>
        </div>

        <div id="home-section" class="form-section">
            <h2 class="form-title">支出記錄</h2>
            <div class="form-grid">
                <div class="form-group">
                    <label>項目</label>
                    <input type="text" id="item">
                </div>
                <div class="form-group">
                    <label>交付日期</label>
                    <input type="text" id="delivery-date">
                </div>
                <div class="form-group">
                    <label>期間</label>
                    <select id="period">
                        <option value="">選擇月份</option>
                        <option>1月</option><option>2月</option><option>3月</option>
                        <option>4月</option><option>5月</option><option>6月</option>
                        <option>7月</option><option>8月</option><option>9月</option>
                        <option>10月</option><option>11月</option><option>12月</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>支出方式</label>
                    <select id="payment-method">
                        <option value="">選擇方式</option>
                        <option>現金</option><option>支付寶</option><option>PayMe</option>
                        <option>微信支付</option><option>個人Visa</option><option>個人轉數快</option>
                        <option>個人戶口</option><option>公司扣賬卡</option><option>公司轉數快</option>
                        <option>公司戶口</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>金額</label>
                    <input type="number" id="amount">
                </div>
                <div class="form-group">
                    <label>備注</label>
                    <textarea id="remark"></textarea>
                </div>
            </div>
            <button class="btn" id="submit-btn">確定完成</button>
        </div>

        <div class="records-section">
            <h2 class="form-title">儲存紀錄</h2>
            <table class="records-table">
                <thead>
                    <tr>
                        <th>項目</th><th>交付日期</th><th>期間</th>
                        <th>支出方式</th><th>金額</th><th>備注</th>
                    </tr>
                </thead>
                <tbody id="records-body"></tbody>
            </table>
        </div>

        <div id="admin-section" class="csv-section hidden">
            <h2 class="form-title">CSV / Excel 匯入（智能判斷）</h2>
            <p>自動偵測第一個日期時間行，前面全部忽略</p>
            <input type="file" id="file-upload" class="file-input" accept=".csv,.xlsx,.xls">
            <button class="btn" id="parse-btn">解析並匯入</button>
            <p id="parse-result"></p>
        </div>

        <div id="password-modal" class="password-modal hidden">
            <div class="password-form">
                <h2>管理員密碼</h2>
                <input type="password" id="admin-password">
                <button class="btn" id="verify-btn">驗證</button>
                <p id="pwd-error"></p>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
    <script>
        const ADMIN_PASSWORD = "admin123";
        const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyuxyXs2qIp6fuTDCg3YSFMOlMRnJY8Cbjn7x6JRiT-LSQrmbVGan8l623JpzYk3AKGew/exec";
        const DATE_REGEX = /\d{1,2}\/\d{1,2}\/\d{2,4}\s+\d{1,2}:\d{2}/;

        flatpickr("#delivery-date", { dateFormat: "Y-m-d", defaultDate: new Date() });

        document.getElementById("admin-link").onclick = () => {
            document.getElementById("password-modal").classList.remove("hidden");
        };
        document.getElementById("home-link").onclick = () => {
            document.getElementById("admin-section").classList.add("hidden");
            document.getElementById("home-section").classList.remove("hidden");
        };
        document.getElementById("verify-btn").onclick = () => {
            if (document.getElementById("admin-password").value === ADMIN_PASSWORD) {
                document.getElementById("password-modal").classList.add("hidden");
                document.getElementById("home-section").classList.add("hidden");
                document.getElementById("admin-section").classList.remove("hidden");
            } else {
                document.getElementById("pwd-error").textContent = "密碼錯誤";
            }
        };

        document.getElementById("submit-btn").onclick = async () => {
            const data = {
                item: document.getElementById("item").value,
                deliveryDate: document.getElementById("delivery-date").value,
                period: document.getElementById("period").value,
                paymentMethod: document.getElementById("payment-method").value,
                amount: document.getElementById("amount").value,
                remark: document.getElementById("remark").value
            };
            await fetch(GOOGLE_SCRIPT_URL, {
                method: "POST",
                body: JSON.stringify({ action: "saveRecord", data })
            });
            loadRecords();
        };

        async function loadRecords() {
            const res = await fetch(GOOGLE_SCRIPT_URL, {
                method: "POST",
                body: JSON.stringify({ action: "getRecords" })
            });
            const json = await res.json();
            const body = document.getElementById("records-body");
            body.innerHTML = "";
            json.records.forEach(r => {
                body.innerHTML += `<tr>
                    <td>${r.item}</td>
                    <td>${r.deliveryDate}</td>
                    <td>${r.period}</td>
                    <td>${r.paymentMethod}</td>
                    <td>${r.amount}</td>
                    <td>${r.remark}</td>
                </tr>`;
            });
        }

        document.getElementById("parse-btn").onclick = () => {
            const file = document.getElementById("file-upload").files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = e => {
                const data = new Uint8Array(e.target.result);
                const wb = XLSX.read(data, { type: "array" });
                const ws = wb.Sheets[wb.SheetNames[0]];
                const arr = XLSX.utils.sheet_to_json(ws, { header: 1 });
                
                let startRow = -1;
                for (let i = 0; i < arr.length; i++) {
                    const a = arr[i][0] + "";
                    if (DATE_REGEX.test(a)) {
                        startRow = i;
                        break;
                    }
                }
                if (startRow === -1) {
                    document.getElementById("parse-result").textContent = "找不到日期時間";
                    return;
                }
                const list = arr.slice(startRow).map(r => ({
                    a: r[0] || "", b: r[1] || "", c: r[2] || ""
                }));
                fetch(GOOGLE_SCRIPT_URL, {
                    method: "POST",
                    body: JSON.stringify({ action: "importCsvData", data: list })
                }).then(() => {
                    document.getElementById("parse-result").textContent = `成功匯入 ${list.length} 筆`;
                });
            };
            reader.readAsArrayBuffer(file);
        };

        loadRecords();
    </script>
</body>
</html>
