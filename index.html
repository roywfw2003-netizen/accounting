<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>會計管理系統 · 黑色主題 · 完整版</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
        }
        body {
            background-color: #121212;
            color: #e0e0e0;
            padding: 16px;
            min-height: 100vh;
        }
        .container {
            max-width: 100%;
            margin: 0 auto;
        }
        /* 頂部按鈕列 - 可橫向滾動 */
        .nav-bar {
            display: flex;
            flex-wrap: nowrap;
            overflow-x: auto;
            gap: 8px;
            margin-bottom: 20px;
            background: #1e1e1e;
            padding: 12px;
            border-radius: 40px;
            border: 1px solid #333;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: thin;
        }
        .nav-bar::-webkit-scrollbar {
            height: 4px;
            background: #333;
        }
        .nav-bar::-webkit-scrollbar-thumb {
            background: #666;
            border-radius: 4px;
        }
        .nav-btn {
            background: #2d2d2d;
            border: none;
            color: #e0e0e0;
            padding: 10px 20px;
            border-radius: 30px;
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            border: 1px solid #444;
            flex: 0 0 auto;
            white-space: nowrap;
        }
        .nav-btn.active {
            background: #0d6efd;
            color: white;
            border-color: #0d6efd;
        }

        /* 面板通用 */
        .panel {
            display: none;
            background: #1e1e1e;
            border-radius: 28px;
            padding: 20px;
            border: 1px solid #333;
            margin-top: 12px;
        }
        .panel.active {
            display: block;
        }
        h2 {
            font-size: 1.4rem;
            font-weight: 400;
            margin-bottom: 18px;
            color: #fff;
            border-left: 5px solid #0d6efd;
            padding-left: 16px;
        }
        h3 {
            font-size: 1.2rem;
            margin: 16px 0 12px;
            color: #ccc;
        }

        /* 六項輸入列 - 手機上可滾動 */
        .form-row-6 {
            display: flex;
            flex-wrap: nowrap;
            overflow-x: auto;
            gap: 12px;
            padding: 16px 8px;
            background: #2a2a2a;
            border-radius: 40px;
            margin-bottom: 20px;
            border: 1px solid #444;
            -webkit-overflow-scrolling: touch;
        }
        .form-group {
            min-width: 140px;
            flex: 0 0 auto;
        }
        .form-group label {
            display: block;
            font-size: 0.65rem;
            text-transform: uppercase;
            color: #aaa;
            margin-bottom: 4px;
        }
        .form-control {
            width: 100%;
            padding: 10px 12px;
            background: #3a3a3a;
            border: 1px solid #555;
            color: #fff;
            border-radius: 30px;
            font-size: 0.85rem;
            outline: none;
        }
        .form-control:focus {
            border-color: #0d6efd;
        }
        select.form-control {
            appearance: none;
            background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='14' height='14' viewBox='0 0 24 24' fill='none' stroke='%23aaa' stroke-width='2'><polyline points='6 9 12 15 18 9'/></svg>");
            background-repeat: no-repeat;
            background-position: right 12px center;
            background-size: 12px;
        }
        .btn {
            background: #0d6efd;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            border: 1px solid #0d6efd;
            white-space: nowrap;
        }
        .btn-secondary {
            background: #3a3a3a;
            border: 1px solid #555;
            color: #eee;
        }
        .btn-small {
            padding: 6px 12px;
            font-size: 0.8rem;
        }

        /* 記錄表格 */
        .records-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.8rem;
            background: #2a2a2a;
            border-radius: 24px;
            overflow: hidden;
        }
        .records-table th {
            background: #333;
            color: #ccc;
            font-weight: 400;
            padding: 12px 4px;
            text-align: left;
            border-bottom: 1px solid #444;
        }
        .records-table td {
            padding: 10px 4px;
            border-bottom: 1px solid #3a3a3a;
            color: #ddd;
            white-space: nowrap;
        }
        .records-table tr:last-child td {
            border-bottom: none;
        }
        .delete-btn {
            background: none;
            border: none;
            color: #f66;
            font-size: 1.2rem;
            cursor: pointer;
            padding: 0 8px;
        }
        .edit-btn {
            background: none;
            border: none;
            color: #0d6efd;
            font-size: 1.2rem;
            cursor: pointer;
            padding: 0 8px;
        }

        /* 支付方式圖標 (emoji) */
        .payment-icon {
            margin-right: 6px;
            font-size: 1.1rem;
        }

        /* 員工工號管理 - 手機自適應 */
        .employee-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 12px;
            margin-top: 16px;
        }
        .emp-card {
            background: #2a2a2a;
            border-radius: 24px;
            padding: 12px;
            border: 1px solid #444;
        }
        .emp-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px;
        }
        .emp-num {
            background: #0d6efd;
            color: white;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 0.9rem;
        }
        .emp-name-input {
            display: flex;
            gap: 4px;
            margin-bottom: 10px;
        }
        .emp-name-input input {
            flex: 1;
            background: #3a3a3a;
            border: 1px solid #555;
            color: white;
            border-radius: 30px;
            padding: 6px 10px;
            font-size: 0.8rem;
        }
        .name-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            min-height: 40px;
        }
        .name-tag {
            background: #3d3d3d;
            padding: 4px 10px;
            border-radius: 30px;
            font-size: 0.75rem;
            color: #ddd;
            border: 1px solid #555;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            white-space: nowrap;
            max-width: 100%;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .name-tag:first-child {
            background: #0d6efd;
            color: white;
            border-color: #0d6efd;
        }
        .name-tag button {
            background: none;
            border: none;
            color: #ff8888;
            font-size: 1rem;
            cursor: pointer;
            padding: 0 2px;
        }

        /* 員工詳細資料表格 */
        .emp-detail-table {
            width: 100%;
            border-collapse: collapse;
            background: #2a2a2a;
            border-radius: 24px;
            overflow: hidden;
            margin-top: 16px;
        }
        .emp-detail-table th, .emp-detail-table td {
            padding: 10px 6px;
            border-bottom: 1px solid #3a3a3a;
            text-align: left;
            font-size: 0.8rem;
        }
        .emp-detail-table th {
            background: #333;
            color: #aaa;
            font-weight: 400;
        }

        /* 密碼彈窗 */
        .password-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .password-box {
            background: #2a2a2a;
            border-radius: 40px;
            padding: 30px;
            width: 300px;
            border: 1px solid #555;
        }

        /* 摺疊記錄 */
        .year-month-group {
            margin-bottom: 16px;
        }
        .group-header {
            background: #333;
            padding: 12px 16px;
            border-radius: 40px;
            cursor: pointer;
            font-weight: 500;
        }
        .group-content {
            display: none;
            padding: 8px;
            background: #242424;
            border-radius: 24px;
            margin-top: 4px;
        }
        .group-content.show {
            display: block;
        }

        /* 埋數列表 */
        .counting-table {
            overflow-x: auto;
        }
        .counting-table table {
            width: 100%;
            border-collapse: collapse;
            background: #2a2a2a;
            border-radius: 24px;
            padding: 8px;
        }
        .counting-table td, .counting-table th {
            padding: 10px;
            border-bottom: 1px solid #3a3a3a;
        }
        .counting-table input {
            background: #3a3a3a;
            border: 1px solid #555;
            color: white;
            padding: 8px;
            border-radius: 30px;
            width: 100%;
        }

        .mt-4 { margin-top: 20px; }
        .text-center { text-align: center; }
        .flex { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
        .close-btn { margin-left: auto; background: #444; border: none; color: white; padding: 6px 12px; border-radius: 30px; cursor: pointer; }
    </style>
    <script>
        // 簡單長按檢測 (無需外部庫)
        function installLongPress(element, longPressCallback) {
            let timer;
            element.addEventListener('touchstart', (e) => {
                timer = setTimeout(() => {
                    longPressCallback(e);
                }, 500);
            });
            element.addEventListener('touchend', () => clearTimeout(timer));
            element.addEventListener('touchmove', () => clearTimeout(timer));
            element.addEventListener('mousedown', (e) => {
                timer = setTimeout(() => {
                    longPressCallback(e);
                }, 500);
            });
            element.addEventListener('mouseup', () => clearTimeout(timer));
            element.addEventListener('mouseleave', () => clearTimeout(timer));
        }
    </script>
</head>
<body>
<div class="container">
    <!-- 頂部按鈕列 1~9 -->
    <div class="nav-bar" id="navBar">
        <button class="nav-btn active" data-panel="panel1">1.統計表</button>
        <button class="nav-btn" data-panel="panel2">2.公司基本支出</button>
        <button class="nav-btn" data-panel="panel3">3.薪金支出</button>
        <button class="nav-btn" data-panel="panel4">4.其他支出</button>
        <button class="nav-btn" data-panel="panel5">5.淘寶</button>
        <button class="nav-btn" data-panel="panel6">6.點貨系統</button>
        <button class="nav-btn" data-panel="panel7">7.銷售產品</button>
        <button class="nav-btn" data-panel="panel8">8.剪髮付款</button>
        <button class="nav-btn" data-panel="panel9">9.埋數列表</button>
    </div>

    <!-- 面板1: 統計表 -->
    <div id="panel1" class="panel active">
        <h2>📊 統計表</h2>
        <div style="background:#2a2a2a; border-radius:30px; padding:20px;" id="statsSummary">
            <!-- 動態載入 -->
        </div>
    </div>

    <!-- ========== 面板2-7 六項輸入結構 ========== -->
    <!-- 2.公司基本支出 -->
    <div id="panel2" class="panel">
        <h2>🏢 公司基本支出</h2>
        <div class="form-row-6" id="form2">
            <div class="form-group"><label>項目</label><input type="text" class="form-control item" placeholder="項目"></div>
            <div class="form-group"><label>交付日期</label><input type="date" class="form-control date"></div>
            <div class="form-group"><label>期間</label>
                <select class="form-control period">
                    <option value="">選擇月份</option><option>1月</option><option>2月</option><option>3月</option><option>4月</option><option>5月</option><option>6月</option><option>7月</option><option>8月</option><option>9月</option><option>10月</option><option>11月</option><option>12月</option>
                </select>
            </div>
            <div class="form-group"><label>支出方式</label>
                <select class="form-control method">
                    <option data-icon="💵">現金</option><option data-icon="📱">支付寶</option><option data-icon="💳">PayMe</option><option data-icon="💬">微信支付</option><option data-icon="💳">個人Visa</option>
                    <option data-icon="⚡">個人轉數快</option><option data-icon="🏦">個人戶口</option><option data-icon="💳">公司扣賬卡</option><option data-icon="⚡">公司轉數快</option><option data-icon="🏛️">公司戶口</option>
                </select>
            </div>
            <div class="form-group"><label>金額</label><input type="number" step="0.01" class="form-control amount"></div>
            <div class="form-group"><label>備注</label><input type="text" class="form-control remark"></div>
            <div><button class="btn add-expense" data-panel="2">記錄</button></div>
        </div>
        <div id="records2" class="mt-4"></div>
    </div>

    <!-- 3.薪金支出 (項目改為員工名字，下拉選擇工號最新別名) -->
    <div id="panel3" class="panel">
        <h2>💰 薪金支出</h2>
        <div class="form-row-6" id="form3">
            <div class="form-group"><label>員工名字</label>
                <select class="form-control employee-name" id="salaryEmployeeName">
                    <option value="">選擇員工</option>
                </select>
            </div>
            <div class="form-group"><label>交付日期</label><input type="date" class="form-control date"></div>
            <div class="form-group"><label>期間</label><select class="form-control period"><option>1月</option>...<option>12月</option></select></div>
            <div class="form-group"><label>支出方式</label><select class="form-control method">...</select></div>
            <div class="form-group"><label>金額</label><input type="number" step="0.01" class="form-control amount"></div>
            <div class="form-group"><label>備注</label><input type="text" class="form-control remark"></div>
            <div><button class="btn add-expense" data-panel="3">記錄</button></div>
        </div>
        <div id="records3" class="mt-4"></div>
    </div>

    <!-- 4.其他支出 -->
    <div id="panel4" class="panel">
        <h2>📦 其他支出</h2>
        <div class="form-row-6" id="form4">
            <div class="form-group"><label>項目</label><input type="text" class="form-control item"></div>
            <div class="form-group"><label>交付日期</label><input type="date" class="form-control date"></div>
            <div class="form-group"><label>期間</label><select class="form-control period">...</select></div>
            <div class="form-group"><label>支出方式</label><select class="form-control method">...</select></div>
            <div class="form-group"><label>金額</label><input type="number" step="0.01" class="form-control amount"></div>
            <div class="form-group"><label>備注</label><input type="text" class="form-control remark"></div>
            <div><button class="btn add-expense" data-panel="4">記錄</button></div>
        </div>
        <div id="records4" class="mt-4"></div>
    </div>

    <!-- 5.淘寶 -->
    <div id="panel5" class="panel">
        <h2>🛒 淘寶</h2>
        <div class="form-row-6" id="form5"><!-- 同panel4結構，省略內部選項但實際有 --></div>
        <div id="records5" class="mt-4"></div>
    </div>

    <!-- 6.點貨系統 -->
    <div id="panel6" class="panel">
        <h2>📦 點貨系統</h2>
        <div class="form-row-6" id="form6"><!-- 同panel4結構 --></div>
        <div id="records6" class="mt-4"></div>
    </div>

    <!-- 7.銷售產品 -->
    <div id="panel7" class="panel">
        <h2>🛍️ 銷售產品</h2>
        <div class="form-row-6" id="form7"><!-- 同panel4結構 --></div>
        <div id="records7" class="mt-4"></div>
    </div>

    <!-- 面板8: 剪髮付款 + 員工資料（密碼保護） -->
    <div id="panel8" class="panel">
        <h2>✂️ 剪髮付款 & 員工管理</h2>
        <div style="display: flex; flex-direction: column; gap: 20px;">
            <!-- 剪髮付款輸入區 -->
            <div class="form-row-6" style="background: none; padding:0; overflow-x: auto;">
                <div class="form-group"><label>日期</label><input type="date" id="haircutDate" class="form-control"></div>
                <div class="form-group"><label>名字</label><select id="haircutName" class="form-control"><option value="">選擇名字</option></select></div>
                <div class="form-group"><label>工號</label><input type="text" id="haircutEmpNum" class="form-control" readonly></div>
                <div class="form-group"><label>價錢</label><input type="number" id="haircutPrice" class="form-control" step="0.01"></div>
                <div class="form-group"><label>支付方式</label><select id="haircutPayment" class="form-control"><option data-icon="💵">現金</option><option data-icon="📱">支付寶</option><option data-icon="💳">PayMe</option><option data-icon="💬">微信支付</option><option data-icon="⚡">轉數快</option></select></div>
                <div><button class="btn" id="addHaircutBtn">記錄</button></div>
            </div>

            <!-- 員工工號管理（需密碼解鎖） -->
            <div style="background:#2a2a2a; border-radius:40px; padding:20px;">
                <div class="flex">
                    <h3>👥 員工工號管理 (長按名字可移動)</h3>
                    <button class="btn-secondary btn-small" id="unlockEmpBtn">🔓 解鎖</button>
                    <button class="close-btn" id="closeEmpBtn" style="display:none;">🔒 關閉</button>
                </div>
                <div id="employeeGrid" style="opacity:0.5; pointer-events:none;"></div>
            </div>

            <!-- 員工詳細資料管理（需密碼解鎖） -->
            <div style="background:#2a2a2a; border-radius:40px; padding:20px;">
                <div class="flex">
                    <h3>📋 員工詳細資料</h3>
                    <button class="btn-secondary btn-small" id="unlockDetailBtn">🔓 解鎖</button>
                    <button class="close-btn" id="closeDetailBtn" style="display:none;">🔒 關閉</button>
                </div>
                <div id="empDetailSection" style="opacity:0.5; pointer-events:none;"></div>
            </div>

            <!-- 剪髮記錄列表 -->
            <div id="haircutRecords" class="mt-4"></div>
        </div>
    </div>

    <!-- 面板9: 埋數列表 (含摺疊記錄) -->
    <div id="panel9" class="panel">
        <h2>🧮 埋數列表</h2>
        <div class="counting-table">
            <table>
                <thead><tr><th>A (面額)</th><th>B (數量)</th><th>C (小計)</th></tr></thead>
                <tbody id="countingBody">
                    <tr><td></td><td><input type="number" id="b1" class="b-input" step="0.01" value="0"></td><td id="c1">0.00</td></tr>
                    <tr><td>500</td><td><input type="number" id="b2" class="b-input" step="0.01" value="0"></td><td id="c2">0.00</td></tr>
                    <tr><td>100</td><td><input type="number" id="b3" class="b-input" step="0.01" value="0"></td><td id="c3">0.00</td></tr>
                    <tr><td>50</td><td><input type="number" id="b4" class="b-input" step="0.01" value="0"></td><td id="c4">0.00</td></tr>
                    <tr><td>20</td><td><input type="number" id="b5" class="b-input" step="0.01" value="0"></td><td id="c5">0.00</td></tr>
                    <tr><td>10</td><td><input type="number" id="b6" class="b-input" step="0.01" value="0"></td><td id="c6">0.00</td></tr>
                    <tr><td>5</td><td><input type="number" id="b7" class="b-input" step="0.01" value="0"></td><td id="c7">0.00</td></tr>
                    <tr><td>2</td><td><input type="number" id="b8" class="b-input" step="0.01" value="0"></td><td id="c8">0.00</td></tr>
                    <tr><td>1</td><td><input type="number" id="b9" class="b-input" step="0.01" value="0"></td><td id="c9">0.00</td></tr>
                    <tr><td></td><td></td><td id="c10" style="font-weight:bold; color:#0d6efd;">0.00</td></tr>
                </tbody>
            </table>
        </div>
        <div style="display: flex; gap:12px; margin-top:20px;">
            <button class="btn" id="saveCountingBtn">儲存埋數</button>
            <button class="btn-secondary" id="loadCountingBtn">載入上次</button>
        </div>
        <!-- 摺疊記錄區 -->
        <h3 class="mt-4">📅 歷史埋數記錄</h3>
        <div id="countingHistory" class="mt-4"></div>
    </div>
</div>

<!-- 密碼輸入浮層 (隱藏) -->
<div id="passwordOverlay" class="password-overlay" style="display:none;">
    <div class="password-box">
        <h3 style="margin-bottom:16px;">輸入管理密碼</h3>
        <input type="password" id="passwordInput" class="form-control" placeholder="密碼">
        <div style="display:flex; gap:12px; margin-top:20px;">
            <button class="btn" id="submitPassword">確認</button>
            <button class="btn-secondary" id="cancelPassword">取消</button>
        </div>
    </div>
</div>

<script>
    (function() {
        // ---------- 全域設定 ----------
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxhMFhXz5CjiggUOrOM261fSklNuh-2Ms4hvKV1SdFrdTbARQlDLP8olVhJovkrm4Na/exec'; // 請換成您的部署網址
        const SHEET_MAP = {
            2: '公司基本支出', 3: '薪金支出', 4: '其他支出', 5: '淘寶', 6: '點貨系統', 7: '銷售產品',
            8: '剪髮付款', 9: '埋數列表', 'employee': '員工資料'
        };
        const MANAGER_PASSWORD = '0000'; // 管理密碼

        // ---------- 儲存到Google Sheets (append) ----------
        function appendToSheet(sheetName, rowData, callback) {
            const iframe = document.createElement('iframe');
            iframe.style.display = 'none';
            iframe.name = 'iframe' + Date.now();
            document.body.appendChild(iframe);

            const timeout = setTimeout(() => {
                iframe.remove();
                if (callback) callback(false);
            }, 8000);

            function listener(e) {
                if (e.data === 'success') {
                    clearTimeout(timeout);
                    if (callback) callback(true);
                } else if (typeof e.data === 'string' && e.data.startsWith('error')) {
                    clearTimeout(timeout);
                    alert('Google Sheets儲存失敗：' + e.data);
                    if (callback) callback(false);
                }
                window.removeEventListener('message', listener);
                iframe.remove();
            }
            window.addEventListener('message', listener);

            const form = document.createElement('form');
            form.method = 'POST';
            form.action = SCRIPT_URL;
            form.target = iframe.name;
            form.style.display = 'none';
            form.innerHTML = `
                <input name="action" value="append">
                <input name="sheet" value="${sheetName}">
                <input name="data" value='${JSON.stringify(rowData)}'>
            `;
            document.body.appendChild(form);
            form.submit();
            setTimeout(() => form.remove(), 1000);
        }

        function addRecord(pid) {
            const form = document.getElementById(`form${pid}`);
            let item, date, period, method, amount, remark;
            if (pid === 3) {
                // 薪金支出：員工名字來自下拉選單

                item = select ? select.value : '';
            } else {

            date = form.querySelector('.date')?.value;
            period = form.querySelector('.period')?.value;
            const methodSelect = form.querySelector('.method');
            method = methodSelect ? methodSelect.options[methodSelect.selectedIndex].text.replace(/[^\w\u4e00-\u9fa5]/g,'') : '';
            amount = parseFloat(form.querySelector('.amount')?.value) || 0;
            remark = form.querySelector('.remark')?.value;

            if (!item || !date || !period || amount <= 0) {
                alert('請填寫項目/員工名字、日期、期間及金額');
                return;
            }

            const record = { timestamp: Date.now(), item, date, period, method, amount, remark };
            const key = `panel${pid}`;
            let records = JSON.parse(localStorage.getItem(key) || '[]');
            records.push(record);
            localStorage.setItem(key, JSON.stringify(records));
            appendToSheet(SHEET_MAP[pid], record);
            renderRecords(pid);
            // 清空欄位
            if (pid === 3) {
                form.querySelector('.employee-name').value = '';
            } else {

            }
            form.querySelector('.period').value = '';
            form.querySelector('.amount').value = '';
            form.querySelector('.remark').value = '';
        }

        function updateRecord(pid, timestamp) {
            const form = document.getElementById(`form${pid}`);
            let item, date, period, method, amount, remark;
            if (pid === 3) {
                const select = form.querySelector('.employee-name');
                item = select ? select.value : '';
            } else {
                item = form.querySelector('.item')?.value;
            }
            date = form.querySelector('.date')?.value;
            period = form.querySelector('.period')?.value;
            const methodSelect = form.querySelector('.method');
            method = methodSelect ? methodSelect.options[methodSelect.selectedIndex].text.replace(/[^\w\u4e00-\u9fa5]/g,'') : '';
            amount = parseFloat(form.querySelector('.amount')?.value) || 0;
            remark = form.querySelector('.remark')?.value;

            if (!item || !date || !period || amount <= 0) {
                alert('請填寫完整');
                return;
            }

            const key = `panel${pid}`;
            let records = JSON.parse(localStorage.getItem(key) || '[]');
            const index = records.findIndex(r => r.timestamp == timestamp);
            if (index !== -1) {
                records[index] = { ...records[index], item, date, period, method, amount, remark };
                localStorage.setItem(key, JSON.stringify(records));
                appendToSheet(SHEET_MAP[pid], records[index]); // 同步到sheets
            }
            renderRecords(pid);
            // 退出編輯模式
            delete form.dataset.editingId;
            form.querySelector('.add-expense').innerText = '記錄';
            // 清空
            if (pid === 3) form.querySelector('.employee-name').value = '';
            else form.querySelector('.item').value = '';
            form.querySelector('.period').value = '';
            form.querySelector('.amount').value = '';
            form.querySelector('.remark').value = '';
        }

        function renderRecords(panelId) {
            const container = document.getElementById(`records${panelId}`);
            if (!container) return;
            const key = `panel${panelId}`;
            const records = JSON.parse(localStorage.getItem(key) || '[]');
            if (records.length === 0) {
                container.innerHTML = '<p style="color:#aaa; padding:16px;">尚無記錄</p>';
                return;
            }
            const sorted = records.slice().reverse();
            let html = '<table class="records-table"><thead><tr><th>日期</th><th>項目</th><th>期間</th><th>方式</th><th>金額</th><th>備註</th><th></th></tr></thead><tbody>';

                    <td>${r.period || ''}</td>
                    <td>${r.method || ''}</td>

            const record = records.find(r => r.timestamp == timestamp);
            if (!record) return;
            const form = document.getElementById(`form${panelId}`);
            if (panelId === 3) {
                form.querySelector('.employee-name').value = record.item || '';

                form.querySelector('.item').value = record.item || '';

            form.querySelector('.date').value = record.date || today;
            form.querySelector('.period').value = record.period || '';

            const methodSelect = form.querySelector('.method');
            for (let i=0; i<methodSelect.options.length; i++) {
                if (methodSelect.options[i].text.includes(record.method)) {
                    methodSelect.selectedIndex = i;
                    break;
                }
            }
            form.querySelector('.amount').value = record.amount || '';
            form.querySelector('.remark').value = record.remark || '';

            form.querySelector('.add-expense').innerText = '更新';

        function updateStats() {
            let total = 0;
            panelIds.forEach(pid => total += (JSON.parse(localStorage.getItem(`panel${pid}`) || '[]').length));
            document.getElementById('statsSummary').innerHTML = `<p>目前總記錄數: ${total}</p>`;
        }

        // ---------- 初始化 ----------
        renderEmployeeGrid();
        populateNameDropdown();
        updateSalaryEmployeeDropdown();
        renderHaircutRecords();
        updateCounting();
        renderCountingHistory();
        updateStats();
        // 初始鎖住員工區
        document.getElementById('employeeGrid').style.opacity = '0.5';
        document.getElementById('employeeGrid').style.pointerEvents = 'none';
        document.getElementById('empDetailSection').style.opacity = '0.5';
        document.getElementById('empDetailSection').style.pointerEvents = 'none';
    })();
</script>
