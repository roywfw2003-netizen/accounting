<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>黑色會計管理系統</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #121212;
            color: #e0e0e0;
            padding: 16px;
            min-height: 100vh;
        }

        .container {
            max-width: 100%;
            margin: 0 auto;
        }

        /* 頂部導航 */
        .nav-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 20px;
            background: #1e1e1e;
            padding: 10px;
            border-radius: 40px;
            border: 1px solid #333;
        }

        .nav-btn {
            background: #2d2d2d;
            border: none;
            color: #e0e0e0;
            padding: 10px 20px;
            border-radius: 40px;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            border: 1px solid #444;
            transition: all 0.2s;
            flex: 1;
            text-align: center;
        }

        .nav-btn.active {
            background: #0d6efd;
            color: white;
            border-color: #0d6efd;
        }

        /* 面板通用 */
        .panel {
            display: none;
            background: #1e1e1e;
            border-radius: 32px;
            padding: 20px;
            border: 1px solid #333;
        }

        .panel.active {
            display: block;
        }

        h2 {
            font-size: 1.4rem;
            font-weight: 500;
            margin-bottom: 18px;
            color: #fff;
            border-left: 4px solid #0d6efd;
            padding-left: 14px;
        }

        h3 {
            font-size: 1.1rem;
            margin: 20px 0 12px;
            color: #ccc;
        }

        /* 表單行（橫向滾動） */
        .form-row {
            display: flex;
            flex-wrap: nowrap;
            overflow-x: auto;
            gap: 12px;
            padding: 12px 6px;
            background: #2a2a2a;
            border-radius: 40px;
            margin-bottom: 16px;
            border: 1px solid #444;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: thin;
        }

        .form-row::-webkit-scrollbar {
            height: 4px;
            background: #333;
        }
        .form-row::-webkit-scrollbar-thumb {
            background: #666;
            border-radius: 4px;
        }

        .form-group {
            min-width: 150px;
            flex: 0 0 auto;
        }

        .form-group label {
            display: block;
            font-size: 0.7rem;
            text-transform: uppercase;
            color: #aaa;
            margin-bottom: 4px;
            letter-spacing: 0.5px;
        }

        .form-control {
            width: 100%;
            padding: 10px 12px;
            background: #3a3a3a;
            border: 1px solid #555;
            color: #fff;
            border-radius: 30px;
            font-size: 0.9rem;
            outline: none;
        }

        .form-control:focus {
            border-color: #0d6efd;
        }

        select.form-control {
            appearance: none;
            background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='16' height='16' viewBox='0 0 24 24' fill='none' stroke='%23aaa' stroke-width='2'><polyline points='6 9 12 15 18 9'/></svg>");
            background-repeat: no-repeat;
            background-position: right 12px center;
            background-size: 14px;
        }

        .btn {
            background: #0d6efd;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            font-size: 0.9rem;
            transition: 0.2s;
            display: inline-block;
            text-align: center;
        }

        .btn-secondary {
            background: #3a3a3a;
            border: 1px solid #555;
            color: #eee;
        }

        .btn-small {
            padding: 6px 14px;
            font-size: 0.8rem;
        }

        /* 按鈕列 */
        .action-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 20px;
            align-items: center;
        }

        /* 表格記錄 */
        .table-wrapper {
            overflow-x: auto;
            margin-top: 16px;
            border-radius: 24px;
            background: #2a2a2a;
        }

        .records-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.8rem;
            min-width: 500px;
        }

        .records-table th,
        .records-table td {
            padding: 12px 8px;
            text-align: left;
            border-bottom: 1px solid #3a3a3a;
        }

        .records-table th {
            background: #333;
            color: #ccc;
            font-weight: 500;
        }

        /* 統計卡片 */
        .stats-card {
            background: #2a2a2a;
            border-radius: 24px;
            padding: 16px;
            margin-bottom: 24px;
        }

        .date-range {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            align-items: flex-end;
            margin-bottom: 20px;
        }

        .date-range .form-group {
            min-width: 130px;
            flex: 1;
        }

        .stats-result {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
        }

        .stats-total {
            background: #0d6efd20;
            border-radius: 24px;
            padding: 16px;
            flex: 1;
            text-align: center;
            min-width: 140px;
        }

        .stats-total .number {
            font-size: 2rem;
            font-weight: 600;
            color: #0d6efd;
        }

        .stats-method {
            flex: 2;
            background: #1e1e1e;
            border-radius: 24px;
            padding: 16px;
            overflow-x: auto;
        }

        .stats-method table {
            width: 100%;
            border-collapse: collapse;
        }

        .stats-method td {
            padding: 8px;
            border-bottom: 1px solid #333;
        }

        /* CSV 上傳區 */
        .csv-upload {
            background: #2a2a2a;
            border-radius: 32px;
            padding: 20px;
            margin-bottom: 20px;
        }

        /* 管理員設定區 */
        .admin-settings {
            background: #2a2a2a;
            border-radius: 32px;
            padding: 20px;
        }

        /* 密碼彈窗 */
        .password-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .password-box {
            background: #2a2a2a;
            border-radius: 40px;
            padding: 28px;
            width: 280px;
            border: 1px solid #555;
        }

        /* 輔助 */
        .mt-2 { margin-top: 8px; }
        .mt-4 { margin-top: 20px; }
        .text-center { text-align: center; }
    </style>
</head>
<body>
<div class="container">
    <!-- 頂部導航 -->
    <div class="nav-bar">
        <button class="nav-btn active" data-panel="main">🏠 主頁</button>
        <button class="nav-btn" data-panel="admin">🔐 管理員</button>
    </div>

    <!-- 主頁面板 -->
    <div id="mainPanel" class="panel active">
        <div class="action-bar">
            <button id="mainOptionBtn" class="btn" style="background: #2d2d2d; border-color: #0d6efd;">1.選項</button>
            <button id="csvBtn" class="btn btn-secondary">📂 CSV 匯入</button>
            <button id="manualSyncBtn" class="btn btn-secondary">🔄 手動同步</button>
        </div>

        <!-- 表單區域 (初始隱藏) -->
        <div id="formContainer" style="display: none;">
            <div class="form-row" id="inputRow"></div>
            <div style="text-align: right; margin-top: 12px;">
                <button id="submitRecordBtn" class="btn">確定完成</button>
            </div>
        </div>

        <!-- CSV 上傳區域 (初始隱藏) -->
        <div id="csvContainer" style="display: none;">
            <div class="csv-upload">
                <h3>📁 上傳 CSV 檔案 (UTF-8)</h3>
                <input type="file" id="csvFileInput" accept=".csv" style="margin: 12px 0; width: 100%;">
                <button id="uploadCsvBtn" class="btn">匯入並儲存</button>
                <p style="font-size: 0.75rem; color: #aaa; margin-top: 10px;">
                    CSV 格式：A 欄為日期時間 (如 1/3/2026 18:30:09)，B 欄為項目，C 欄為金額。
                </p>
            </div>
        </div>

        <!-- 統計表 -->
        <div class="stats-card">
            <h3>📊 統計表</h3>
            <div class="date-range">
                <div class="form-group">
                    <label>開始日期</label>
                    <input type="date" id="startDate" class="form-control">
                </div>
                <div class="form-group">
                    <label>結束日期</label>
                    <input type="date" id="endDate" class="form-control">
                </div>
                <button id="updateStatsBtn" class="btn btn-small">更新統計</button>
            </div>
            <div id="statsResult" class="stats-result">
                <!-- 動態顯示統計 -->
            </div>
        </div>

        <!-- 記錄列表 -->
        <h3>📋 支出記錄</h3>
        <div class="table-wrapper">
            <table class="records-table">
                <thead id="recordsHeader"></thead>
                <tbody id="recordsBody"></tbody>
             </table>
        </div>
    </div>

    <!-- 管理員面板 -->
    <div id="adminPanel" class="panel">
        <h2>🔐 管理員設定</h2>
        <div class="admin-settings">
            <div class="form-group" style="margin-bottom: 16px;">
                <label>主頁按鈕文字</label>
                <input type="text" id="adminBtnLabel" class="form-control" value="1.選項">
            </div>
            <div class="form-group" style="margin-bottom: 16px;">
                <label>六個欄位標籤 (用逗號分隔)</label>
                <input type="text" id="adminFieldLabels" class="form-control" value="項目,交付日期,期間,支出方式,金額,備注">
            </div>
            <div class="form-group" style="margin-bottom: 16px;">
                <label>支出方式選項 (用逗號分隔)</label>
                <input type="text" id="adminPaymentOptions" class="form-control" value="現金,支付寶,PayMe,微信支付,個人Visa,個人轉數快,個人戶口,公司扣賬卡,公司轉數快,公司戶口">
            </div>
            <button id="saveAdminSettings" class="btn">儲存設定</button>
            <button id="resetAdminSettings" class="btn btn-secondary" style="margin-left: 12px;">重置預設</button>
        </div>
    </div>
</div>

<script>
    // ========== 設定 ==========
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxhMFhXz5CjiggUOrOM261fSklNuh-2Ms4hvKV1SdFrdTbARQlDLP8olVhJovkrm4Na/exec'; // 您提供的網址
    const ADMIN_PASSWORD = 'admin123';

    // 預設設定
    const DEFAULT_SETTINGS = {
        mainBtnLabel: '1.選項',
        fieldLabels: ['項目', '交付日期', '期間', '支出方式', '金額', '備注'],
        paymentOptions: ['現金', '支付寶', 'PayMe', '微信支付', '個人Visa', '個人轉數快', '個人戶口', '公司扣賬卡', '公司轉數快', '公司戶口']
    };

    // 全域資料
    let allRecords = [];          // 所有記錄 { project, date, period, payment, amount, remark, timestamp }
    let currentSettings = { ...DEFAULT_SETTINGS };
    let isSyncing = false;

    // ========== 輔助函數 ==========
    function loadSettings() {
        const saved = localStorage.getItem('accounting_settings');
        if (saved) {
            try {
                const s = JSON.parse(saved);
                currentSettings = { ...DEFAULT_SETTINGS, ...s };
            } catch(e) {}
        } else {
            currentSettings = { ...DEFAULT_SETTINGS };
        }
        document.getElementById('adminBtnLabel').value = currentSettings.mainBtnLabel;
        document.getElementById('adminFieldLabels').value = currentSettings.fieldLabels.join(',');
        document.getElementById('adminPaymentOptions').value = currentSettings.paymentOptions.join(',');
        document.getElementById('mainOptionBtn').innerText = currentSettings.mainBtnLabel;
    }

    function saveSettings() {
        localStorage.setItem('accounting_settings', JSON.stringify(currentSettings));
    }

    // 建構表單HTML
    function buildFormHtml() {
        const labels = currentSettings.fieldLabels;
        const paymentOptions = currentSettings.paymentOptions;
        const today = new Date().toISOString().slice(0,10);
        const months = ['', '1月', '2月', '3月', '4月', '5月', '6月', '7月', '8月', '9月', '10月', '11月', '12月'];
        let html = '';
        html += `<div class="form-group"><label>${labels[0]}</label><input type="text" id="field0" class="form-control" autocomplete="off"></div>`;
        html += `<div class="form-group"><label>${labels[1]}</label><input type="date" id="field1" class="form-control" value="${today}"></div>`;
        let periodSelect = `<div class="form-group"><label>${labels[2]}</label><select id="field2" class="form-control">`;
        months.forEach(m => periodSelect += `<option value="${m}">${m}</option>`);
        periodSelect += `</select></div>`;
        html += periodSelect;
        let paymentSelect = `<div class="form-group"><label>${labels[3]}</label><select id="field3" class="form-control">`;
        paymentOptions.forEach(opt => paymentSelect += `<option value="${opt}">${opt}</option>`);
        paymentSelect += `</select></div>`;
        html += paymentSelect;
        html += `<div class="form-group"><label>${labels[4]}</label><input type="number" step="0.01" id="field4" class="form-control"></div>`;
        html += `<div class="form-group"><label>${labels[5]}</label><input type="text" id="field5" class="form-control"></div>`;
        return html;
    }

    function rebuildForm() {
        const container = document.getElementById('inputRow');
        container.innerHTML = buildFormHtml();
        const inputs = container.querySelectorAll('.form-control');
        for (let i = 0; i < inputs.length; i++) {
            inputs[i].addEventListener('keydown', (e) => {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    if (i === inputs.length - 1) {
                        document.getElementById('submitRecordBtn').click();
                    } else {
                        inputs[i+1].focus();
                    }
                }
            });
        }
    }

    // 儲存本地記錄
    function saveRecordsToLocal() {
        localStorage.setItem('accounting_records', JSON.stringify(allRecords));
    }

    // 新增記錄到 Google Sheets (非同步，不影響本機)
    function appendToGoogle(record) {
        const iframe = document.createElement('iframe');
        iframe.style.display = 'none';
        iframe.name = 'iframe_' + Date.now();
        document.body.appendChild(iframe);
        const form = document.createElement('form');
        form.method = 'POST';
        form.action = SCRIPT_URL;
        form.target = iframe.name;
        form.style.display = 'none';
        form.innerHTML = `
            <input name="action" value="append">
            <input name="sheet" value="支出記錄">
            <input name="data" value='${JSON.stringify(record)}'>
        `;
        document.body.appendChild(form);
        form.submit();
        setTimeout(() => {
            form.remove();
            iframe.remove();
        }, 2000);
    }

    // 從 Google Sheets 讀取所有記錄 (JSONP)
    function fetchFromGoogle() {
        return new Promise((resolve, reject) => {
            const callbackName = 'jsonp_cb_' + Date.now();
            window[callbackName] = function(data) {
                delete window[callbackName];
                if (data.error) {
                    reject(data.error);
                } else {
                    let records = [];
                    if (Array.isArray(data)) records = data;
                    else if (data.records) records = data.records;
                    resolve(records);
                }
            };
            const script = document.createElement('script');
            script.src = `${SCRIPT_URL}?action=getAll&callback=${callbackName}`;
            document.body.appendChild(script);
            setTimeout(() => {
                if (window[callbackName]) {
                    delete window[callbackName];
                    reject('Timeout');
                }
            }, 10000);
        });
    }

    // 合併雲端記錄與本地記錄（以 timestamp 為準，本地新增未同步的優先保留）
    function mergeRecords(localRecords, cloudRecords) {
        const map = new Map();
        // 先加入本地記錄
        localRecords.forEach(r => map.set(r.timestamp, r));
        // 雲端記錄若 timestamp 不存在則新增，若存在但本地版本較舊則覆蓋？實際上本地可能已修改，但我們策略是雲端為主備份，但為了避免覆蓋本地新增未同步的，我們保留本地較新的。
        cloudRecords.forEach(r => {
            if (!map.has(r.timestamp)) {
                map.set(r.timestamp, r);
            } else {
                // 如果本地已有相同 timestamp，保留本地（因為本地可能已修改）
                // 不做覆蓋
            }
        });
        return Array.from(map.values());
    }

    // 同步：從雲端拉取並合併本地
    async function syncFromCloud() {
        if (isSyncing) return;
        isSyncing = true;
        try {
            const cloudRecords = await fetchFromGoogle();
            const localRecords = [...allRecords];
            const merged = mergeRecords(localRecords, cloudRecords);
            allRecords = merged;
            saveRecordsToLocal();
            renderRecords();
            updateStatistics();
            console.log('同步成功，共 ' + allRecords.length + ' 筆記錄');
        } catch (err) {
            console.warn('同步失敗，使用本地資料', err);
        } finally {
            isSyncing = false;
        }
    }

    // 手動同步：將本地所有記錄推送到雲端 (覆蓋或追加？這裡採用追加方式，但避免重複，我們可以將本地尚未同步的記錄逐一推送，較簡單做法是將本地全部重新寫入？但為了簡單，我們提供一個按鈕將本地所有記錄發送到雲端（可能造成重複）。但更合理是：用戶點擊「手動同步」時，先從雲端拉取合併，然後再將合併後的完整數據推送到雲端（覆蓋整個工作表），但需要 Apps Script 支援 overwrite。但我們之前的 append 方式只支持追加。為保持簡單，我們先只做拉取合併，不推送全部。若要推送全部，需要修改 Apps Script。這裡我們實現「將本地記錄推送到雲端（逐筆追加）」作為備用功能。
    function pushLocalToCloud() {
        if (allRecords.length === 0) return;
        if (confirm('將本地所有記錄上傳到 Google Sheets（可能產生重複，請確認）')) {
            allRecords.forEach(rec => appendToGoogle(rec));
            alert('已嘗試上傳，請稍後檢查雲端');
        }
    }

    // 記錄列表渲染
    function renderRecords() {
        const thead = document.getElementById('recordsHeader');
        const tbody = document.getElementById('recordsBody');
        const labels = currentSettings.fieldLabels;
        thead.innerHTML = `<tr>${labels.map(l => `<th>${l}</th>`).join('')}</tr>`;
        if (allRecords.length === 0) {
            tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;">尚無記錄</td></tr>';
            return;
        }
        const sorted = [...allRecords].sort((a,b) => (b.timestamp || 0) - (a.timestamp || 0));
        tbody.innerHTML = sorted.map(rec => `
            <tr>
                <td>${rec.project || ''}</td>
                <td>${rec.date || ''}</td>
                <td>${rec.period || ''}</td>
                <td>${rec.payment || ''}</td>
                <td>${rec.amount ? rec.amount.toFixed(2) : ''}</td>
                <td>${rec.remark || ''}</td>
            </tr>
        `).join('');
    }

    // 統計表更新
    function updateStatistics() {
        let start = document.getElementById('startDate').value;
        let end = document.getElementById('endDate').value;
        if (!start || !end) {
            const now = new Date();
            const firstDay = new Date(now.getFullYear(), now.getMonth(), 1).toISOString().slice(0,10);
            const lastDay = new Date(now.getFullYear(), now.getMonth()+1, 0).toISOString().slice(0,10);
            start = firstDay;
            end = lastDay;
            document.getElementById('startDate').value = start;
            document.getElementById('endDate').value = end;
        }
        const filtered = allRecords.filter(rec => {
            if (!rec.date) return false;
            return rec.date >= start && rec.date <= end;
        });
        const total = filtered.reduce((sum, r) => sum + (r.amount || 0), 0);
        const methodMap = new Map();
        filtered.forEach(r => {
            const m = r.payment || '未分類';
            methodMap.set(m, (methodMap.get(m) || 0) + (r.amount || 0));
        });
        const methodList = Array.from(methodMap.entries()).sort((a,b) => b[1] - a[1]);
        let methodHtml = '<table><tr><th>支付方式</th><th>總金額</th></tr>';
        methodList.forEach(([m, amt]) => {
            methodHtml += `<tr><td>${m}</td><td>$${amt.toFixed(2)}</td></tr>`;
        });
        methodHtml += '</table>';
        const statsDiv = document.getElementById('statsResult');
        statsDiv.innerHTML = `
            <div class="stats-total">
                <div>總支出</div>
                <div class="number">$${total.toFixed(2)}</div>
            </div>
            <div class="stats-method">
                <div>支出方式統計</div>
                ${methodHtml}
            </div>
        `;
    }

    // 儲存新記錄
    function saveRecord() {
        const labels = currentSettings.fieldLabels;
        const project = document.getElementById('field0').value.trim();
        const date = document.getElementById('field1').value;
        const period = document.getElementById('field2').value;
        const payment = document.getElementById('field3').value;
        const amount = parseFloat(document.getElementById('field4').value) || 0;
        const remark = document.getElementById('field5').value.trim();

        if (!project || !date || amount <= 0) {
            alert(`請填寫 ${labels[0]}、${labels[1]} 且金額大於0`);
            return;
        }

        const newRecord = {
            project,
            date,
            period,
            payment,
            amount,
            remark,
            timestamp: Date.now()
        };
        allRecords.push(newRecord);
        saveRecordsToLocal();
        appendToGoogle(newRecord);
        renderRecords();
        updateStatistics();
        // 清空項目、金額、備註
        document.getElementById('field0').value = '';
        document.getElementById('field4').value = '';
        document.getElementById('field5').value = '';
    }

    // CSV 匯入
    function importCsv(file) {
        const reader = new FileReader();
        reader.onload = function(e) {
            const text = e.target.result;
            const lines = text.split(/\r?\n/);
            if (lines.length === 0) return;
            const data = lines.map(line => line.split(',').map(cell => cell.trim()));
            const dateTimeRegex = /(\d{1,2}\/\d{1,2}\/\d{4}\s+\d{1,2}:\d{2}:\d{2})/;
            let importedCount = 0;
            for (let i = 0; i < data.length; i++) {
                const row = data[i];
                if (row.length < 3) continue;
                const cellA = row[0];
                if (dateTimeRegex.test(cellA)) {
                    const dateTime = cellA;
                    const project = row[1] || '';
                    const amount = parseFloat(row[2]) || 0;
                    if (amount <= 0) continue;
                    const newRecord = {
                        project,
                        date: dateTime,
                        period: '',
                        payment: '',
                        amount,
                        remark: '',
                        timestamp: Date.now() + importedCount
                    };
                    allRecords.push(newRecord);
                    appendToGoogle(newRecord);
                    importedCount++;
                }
            }
            if (importedCount > 0) {
                saveRecordsToLocal();
                renderRecords();
                updateStatistics();
                alert(`成功匯入 ${importedCount} 筆記錄`);
            } else {
                alert('找不到符合日期時間格式的資料');
            }
        };
        reader.readAsText(file, 'UTF-8');
    }

    // 管理員功能
    function showAdminPassword() {
        const overlay = document.createElement('div');
        overlay.className = 'password-overlay';
        overlay.innerHTML = `
            <div class="password-box">
                <h3>輸入管理員密碼</h3>
                <input type="password" id="adminPwdInput" class="form-control" style="margin: 12px 0;">
                <div style="display: flex; gap: 12px;">
                    <button id="adminPwdConfirm" class="btn">確認</button>
                    <button id="adminPwdCancel" class="btn-secondary">取消</button>
                </div>
            </div>
        `;
        document.body.appendChild(overlay);
        const confirmBtn = overlay.querySelector('#adminPwdConfirm');
        const cancelBtn = overlay.querySelector('#adminPwdCancel');
        const pwdInput = overlay.querySelector('#adminPwdInput');
        const close = () => overlay.remove();
        confirmBtn.onclick = () => {
            if (pwdInput.value === ADMIN_PASSWORD) {
                close();
                document.getElementById('adminPanel').classList.add('active');
                document.getElementById('mainPanel').classList.remove('active');
                document.querySelectorAll('.nav-btn').forEach(btn => {
                    if (btn.dataset.panel === 'admin') btn.classList.add('active');
                    else btn.classList.remove('active');
                });
            } else {
                alert('密碼錯誤');
                close();
            }
        };
        cancelBtn.onclick = close;
    }

    function saveAdminSettings() {
        const newBtnLabel = document.getElementById('adminBtnLabel').value.trim();
        const labelsStr = document.getElementById('adminFieldLabels').value;
        const paymentStr = document.getElementById('adminPaymentOptions').value;
        const newLabels = labelsStr.split(',').map(s => s.trim());
        const newPayments = paymentStr.split(',').map(s => s.trim());
        if (newLabels.length !== 6) {
            alert('欄位標籤必須為6個，用逗號分隔');
            return;
        }
        currentSettings = {
            mainBtnLabel: newBtnLabel,
            fieldLabels: newLabels,
            paymentOptions: newPayments
        };
        saveSettings();
        document.getElementById('mainOptionBtn').innerText = currentSettings.mainBtnLabel;
        rebuildForm();
        renderRecords();
        alert('設定已儲存');
    }

    function resetAdminSettings() {
        currentSettings = { ...DEFAULT_SETTINGS };
        saveSettings();
        document.getElementById('adminBtnLabel').value = currentSettings.mainBtnLabel;
        document.getElementById('adminFieldLabels').value = currentSettings.fieldLabels.join(',');
        document.getElementById('adminPaymentOptions').value = currentSettings.paymentOptions.join(',');
        document.getElementById('mainOptionBtn').innerText = currentSettings.mainBtnLabel;
        rebuildForm();
        renderRecords();
        alert('已重置為預設');
    }

    // ========== 事件綁定 ==========
    document.getElementById('mainOptionBtn').addEventListener('click', () => {
        const formContainer = document.getElementById('formContainer');
        const csvContainer = document.getElementById('csvContainer');
        if (formContainer.style.display === 'none') {
            rebuildForm();
            formContainer.style.display = 'block';
            csvContainer.style.display = 'none';
        } else {
            formContainer.style.display = 'none';
        }
    });
    document.getElementById('csvBtn').addEventListener('click', () => {
        const csvContainer = document.getElementById('csvContainer');
        const formContainer = document.getElementById('formContainer');
        if (csvContainer.style.display === 'none') {
            csvContainer.style.display = 'block';
            formContainer.style.display = 'none';
        } else {
            csvContainer.style.display = 'none';
        }
    });
    document.getElementById('manualSyncBtn').addEventListener('click', async () => {
        await syncFromCloud();
        alert('同步完成');
    });
    document.getElementById('submitRecordBtn').addEventListener('click', saveRecord);
    document.getElementById('uploadCsvBtn').addEventListener('click', () => {
        const fileInput = document.getElementById('csvFileInput');
        if (!fileInput.files.length) {
            alert('請選擇 CSV 檔案');
            return;
        }
        importCsv(fileInput.files[0]);
    });
    document.getElementById('updateStatsBtn').addEventListener('click', updateStatistics);
    document.querySelectorAll('.nav-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            const target = btn.dataset.panel;
            if (target === 'admin') {
                showAdminPassword();
            } else {
                document.getElementById('mainPanel').classList.add('active');
                document.getElementById('adminPanel').classList.remove('active');
                document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
            }
        });
    });
    document.getElementById('saveAdminSettings').addEventListener('click', saveAdminSettings);
    document.getElementById('resetAdminSettings').addEventListener('click', resetAdminSettings);

    // ========== 初始化 ==========
    async function init() {
        loadSettings();
        rebuildForm();
        // 優先從本地讀取記錄
        const localRecords = localStorage.getItem('accounting_records');
        if (localRecords) {
            try {
                allRecords = JSON.parse(localRecords);
                renderRecords();
                updateStatistics();
            } catch(e) {}
        }
        // 背景同步雲端
        await syncFromCloud();
    }
    init();
</script>
</body>
